[project]
name = "{{name}}"
entry-point = "main.jac"

[jac-shadcn]
style = "nova"
baseColor = "neutral"
theme = "neutral"
font = "figtree"
radius = "default"
menuAccent = "subtle"
# `registry` defaults to https://jac-shadcn.jaseci.org. Uncomment + set
# only if you're pointing at a self-hosted or private mirror.
# registry = "https://my-mirror.example.com"

[serve]
base_route_app = "app"

[dependencies.npm]
clsx = "^2.1.1"
tailwind-merge = "^3.5.0"
tw-animate-css = "^1.4.0"

[dependencies.npm.dev]
"@jac-client/dev-deps" = "1.0.0"
"@tailwindcss/vite" = "latest"
tailwindcss = "latest"

[plugins.client.vite]
plugins = ["tailwindcss()"]
lib_imports = ["import tailwindcss from '@tailwindcss/vite'"]

[jacpack]
name = "shadcn"
description = "Jac project with shadcn UI components and theming"

[jacpack.options]
directories = ["components", "components/ui", "lib", "pages"]
