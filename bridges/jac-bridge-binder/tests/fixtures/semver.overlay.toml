# Overlay for the semver bridge — the seed-crate case that motivated the
# `treat_as = "opaque"` escape hatch.
#
# `semver::Version`, `VersionReq`, and `Comparator` are all-public-field structs,
# so the binder treats them as transparent (wide-lane) data and drops them — yet
# their real API lives entirely in methods (`Version::parse`, `VersionReq::matches`,
# `Comparator::matches`). Forcing them opaque bridges them as boxed handles and
# exposes those methods; their public fields are then recovered automatically by
# the opaque field-reader lane (`major`/`minor`/`patch` scalars, `pre`/`build`
# handles), so NO hand-written `inject` is needed. Display (`to_string`), Ord
# (`cmp`), and FromStr (`from_str`) likewise bridge automatically off their impls.
[type."Version"]
treat_as = "opaque"

[type."VersionReq"]
treat_as = "opaque"

[type."Comparator"]
treat_as = "opaque"
