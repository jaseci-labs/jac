# Overlay for the regex bridge - a sparse exception file (D6).
#
# The former `find_str` inject is gone: the real owned-wrapper lane bridges
# `Regex::find -> Option<OwnedMatch>` (as_str/start/end readers), so the
# hand-written convenience would only shadow the honest surface. Compiled by the
# round-trip test, so this file can never silently rot.

# Give Regex::is_match a nicer Jac-side name without touching the Rust call.
[fn."Regex::is_match"]
rename = "matches"
