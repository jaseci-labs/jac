# url@2.5.8 (new seed, 2026-07-18) is a canonical string/handle utility crate:
# an opaque `Url` handle with a `parse` ctor and a dense scalar/string accessor
# surface (scheme/username/path/port/... as &str or int), plus Display/FromStr.
# It bridges 19/47 through the opaque + str-return + int-return + synth-trait
# lanes with ZERO overlay. Its value is the SKIP profile: it isolates the still-
# open long-tail lanes on a real crate — `Option<&str>` returns (domain/fragment/
# host_str/password/query — borrowed-Option, distinct from the supported
# Option<String>), `Option<&str>`/`Option<u16>` setter PARAMS (nullable-scalar
# params), unit-error `Result<(),()>` (set_scheme/set_username), a closure arg
# (socket_addrs), and the `from_file_path`/`parse_with_params` generics. `dropped`
# 3 are url's lifetime-bearing views (ParseOptions, PathSegmentsMut, UrlQuery),
# honestly tallied. Raise as the nullable-param / Option-borrow lanes land.
#
# url is now COMPILE-VERIFIED and warning-clean under `-D warnings`: the
# module-level `#[allow(deprecated)]` silences the delegating call to the
# deprecated-but-live `Url::into_string`, which previously made the generated crate
# fail `-D deprecated`.
#
