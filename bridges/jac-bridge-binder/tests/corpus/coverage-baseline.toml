# rust_decimal@1.42.1 (new seed, 2026-07-18) is a fixed-point `Decimal` scalar
# type — the numeric analogue of the datetime crates. 54/90 bridge with ZERO
# overlay via the int-return, Display, Ord, and FromStr lanes plus the checked-
# arithmetic methods that take/return a `Decimal` handle. Its skips isolate the
# scalar-width open lanes precisely: `f64`/`f32` params+returns (as_f64/from_f64/
# from_f32_retain — the na-skips-float-params + f64-param gap), `i128`/`u128`
# params (from_i128/from_u128/as_i128), and trait-vs-inherent duplicate-method
# dedup (abs/checked_add/... exist as both an inherent fn and a std op-trait, so
# the second is a "duplicate method name" skip, not lost capability). No serde
# feature needed (default).
#
# rust_decimal is now COMPILE-VERIFIED (corpus crates had no roundtrip test, so it
# never was). Getting it warning-clean under `-D warnings` drove four GENERAL
# binder fixes (none decimal-specific):
#   * FLOAT scalar lane (ScalarType::Float / BridgeReturn::Float): as_f64/from_f64/
#     from_f32/… cross as an f64 bit pattern in a u64 slot (TAG_F64) — the macro +
#     loader synth already supported it end-to-end; classify was the only gap (+5).
#   * `#[allow(deprecated)]` on the generated module: `Decimal::max_value`/
#     `min_value` are deprecated-but-live public API the binder mirrors; the attr
#     keeps the delegating call warning-clean under `-D warnings`.
#   * error-type name is UpperCamelCased (`RustDecimalError`, not the
#     `Rust_decimalError` that tripped `-D non-camel-case-types`).
#   * flattened-trait `use` paths now resolve through a crate's re-exports in ANY
#     public module: rust_decimal re-exports num_traits' Zero/One/Signed/… in its
#     `prelude`, so the path is `rust_decimal::prelude::Zero`, not the guessed-and-
#     wrong `rust_decimal::num_traits::Zero`. `num_traits::Inv` is re-exported
#     nowhere public, so its `inv` is now an honest skip (no reliable use path).
# Net +5 floats -1 Inv = 54 -> 58. Raise as the i128/u128 + enum-param lanes land.
# The unit-enum PARAM lane (see [time]) then lifted rust_decimal 58 -> 60:
# `round_dp_with_strategy(dp, strategy: RoundingStrategy)` and
# `round_sf_with_strategy` take a fieldless-enum `RoundingStrategy` by value, now
# crossing as its variant-name string (decoded in the wrapper, unknown name
# throws). `total` unchanged (90). Compiles clean under `-D warnings`.
[rust_decimal]
bridged = 60
total = 90
dropped = 0

# time@0.3.53 (new seed, 2026-07-18) is a second real datetime crate beside
# chrono — Date/Time/OffsetDateTime/PrimitiveDateTime/Duration with a dense
# integer-accessor + Display/FromStr + cross-type-handle navigation surface.
# 224/367 bridge with ZERO overlay (chrono needs a monomorphize overlay for its
# Tz generics; time's core types are non-generic, so it rides the existing lanes
# directly and is the better serde-free datetime exemplar). Its skips isolate two
# open shapes on a real crate: the `Month`/`Weekday` ENUM returns/params (unit-
# enum bridging — from_calendar_date/next_occurrence/month) and the `Duration`/
# `StdDuration` handle-BY-VALUE arithmetic params (checked_add/sub — the same
# handle-arg-by-value gap chrono's and_time noted), plus `&mut Formatter` (fmt).
# `dropped` 0: time exposes no unpinned generics or lifetime structs at the top
# level.
#
# The BY-VALUE handle-param lane (ScalarType::HandleValue) then lifted time
# 224 -> 266. A method whose inner takes an OWNED bridged handle
# (`Date::checked_add(self, rhs: Duration) -> Option<Date>`,
# `OffsetDateTime::to_offset(UtcOffset)`, `PrimitiveDateTime::assume_offset`, …)
# now bridges: the ABI is identical to the by-value-ref `&Version` lane (the
# caller passes the other object's handle, the macro reconstructs `&Target`), but
# the wrapper hands the inner call an owned value via `{name}.0.clone()` — sound
# because the target is `Clone` (every `Copy` datetime/duration type qualifies;
# a non-`Clone` target stays a skip). Pure classify+codegen, no macro/loader
# change. `total` unchanged (367): every gain flips a skip to bridged. The
# generated crate compiles warning-clean under `-D warnings` (trimmed to one
# `#[jac_error]` type to sidestep the pre-existing multi-error macro limit).
# The FLOAT scalar lane (ScalarType::Float / BridgeReturn::Float) then lifted time
# 266 -> 274: `Duration::seconds_f64`/`as_seconds_f64`/`seconds_f32`/… cross as an
# f64 bit pattern in a u64 slot (TAG_F64), a lane the macro + loader synth already
# supported end-to-end (the binder classify was the only gap). Compiles clean.
# The UNIT-ENUM value lane (BridgeReturn::EnumName reused for by-value returns)
# then lifted time 274 -> 284: a method returning a public fieldless enum
# (`Date::month -> Month`, `weekday -> Weekday`, on all five datetime types)
# crosses as its variant NAME string — the same `-> String` JacBuf lane the
# fieldless-enum FIELD reader already used, so codegen reuses the `EnumName` arm
# and no ABI/macro/loader change is needed. Pure classify (one arm before the wide
# fallback in `classify_return`). `total` unchanged (367): each gain flips a skip
# to bridged.
# The UNIT-ENUM PARAM lane (ScalarType::Enum — the inbound mirror of the value
# return) then lifted time 284 -> 295: a by-value fieldless-enum param
# (`from_calendar_date(month: Month)`, `replace_month(Month)` ×on all five
# datetime types, `next_occurrence`/`prev_occurrence`/`nth_next_occurrence`/
# `nth_prev_occurrence(Weekday)`) crosses as its variant NAME string on the same
# `&str`/`TAG_STR` lane and is decoded back in the wrapper body. Per the chosen
# fallibility rule, an unknown name has no valid enum value, so the decode does an
# early `return Err(..)` — which lifts an infallible method (`next_occurrence ->
# Self`) to `Result<Self, String>` (already-fallible methods just gain the decode
# preamble). Pure classify+codegen, no macro/loader change (reuses the string-param
# lane). An enum-param fn is DEMOTED in ctor tie-break so a fallible variant-name
# ctor can't steal the slot from a clean sibling. `total` unchanged (367). Compiles
# clean under `-D warnings`. Remaining skips are the tuple-return (to_hms),
# StdDuration-by-value, and i128 scalar lanes.
# The INTEGER-TUPLE return lane (BridgeReturn::Tuple) then lifted time 295 -> 321:
# a by-value tuple of integer scalars (`Time::as_hms -> (u8, u8, u8)`, the
# `_milli`/`_micro`/`_nano` siblings, and `to_hms*`, on `Time`/`OffsetDateTime`/
# `PrimitiveDateTime`) crosses on the EXISTING `List` wire lane — codegen binds the
# source tuple once and re-projects its fields into a `Vec<i64>`
# (`vec![__t.0 as i64, …]`), which the macro tags `TAG_LIST_BIT | TAG_INT` and both
# loaders already decode into a real Jac `list[int]` / Python `list`. No new wire
# tag, macro arm, or loader branch (na has no tuple type and the frozen v1 ABI has
# one return out-slot). The lane is NARROW: only elements that widen losslessly to
# `i64` (`i8..=i64`/`isize`, `u8`/`u16`/`u32`) qualify, so the mixed calendar tuples
# (`to_calendar_date -> (i32, Month, u8)`, `to_iso_week_date -> (i32, u8, Weekday)`)
# and any `u64` element stay honest skips via the wide fallback — no pure-std tuple
# is auto-crossed wide. Pure classify+codegen. `total` unchanged (367). Remaining
# skips are the StdDuration-by-value and i128 scalar lanes.
[time]
bridged = 321
total = 367
dropped = 0
