# Coverage floor for the binder corpus — the north-star metric's ratchet (D6).
#
# The corpus gate (`tests/corpus.rs::coverage_does_not_regress`) fails if any
# crate bridges FEWER items than its floor here. Raise these as Phase B lands
# owning-wrappers, cursors, Vec/slices, and callbacks; never lower one without a
# recorded reason (a genuine upstream API removal on a fixture bump).
#
#   bridged = constructors + methods emitted into the bridge source
#   dropped = whole public types removed before method classification
#             (unpinned generics, const generics, lifetime-bearing structs)
#   total   = bridged + skipped + dropped (every public unit classify considered)
#
# `dropped` makes hidden surface honest: a generic/lifetime type the binder can't
# yet reach is charged one unit of considered-but-unbridged surface instead of
# vanishing from the ratio. The gate FAILS if a crate's live `dropped` count
# exceeds its floor here (coverage must not improve by hiding unsupported types);
# a legitimate increase is ratcheted in by raising the crate's `dropped` with a
# rationale, exactly like `bridged`.
#
# Current numbers reflect the v1 (M3) rule set: opaque types, ctors,
# scalar/str/bool/void, str returns. The low ratios are the whole point —
# they are what M4 Phase B exists to move.

# regex: owning-wrapper synthesis (M4 Phase B v1) rescued `find` -> OwnedMatch
# (readers as_str/is_empty), lifting bridged 7 -> 10. The NESTED-wrapper rule then
# rescued `captures` too: Captures has no DIRECT reader, but its `name(&str) ->
# Option<Match>` is a nested producer of OwnedMatch, giving Captures a readable
# surface (OwnedCaptures.name), lifting bridged 10 -> 12. `total` rose 66 -> 73
# because Captures' own unbridgeable methods (get/len/expand/extract/iter/get_match)
# are now each individually recorded as skips instead of hidden behind one
# `Regex::captures` skip — more honest, not a regression.
#
# The CURSOR + Vec-as-DRAIN rule then rescued the three iterator producers, lifting
# bridged 12 -> 18: find_iter -> OwnedMatches (a cursor, next -> OwnedMatch),
# captures_iter -> OwnedCaptureMatches (a cursor, next -> OwnedCaptures, which merges
# with the type `captures` produces), and split -> OwnedSplit (a Vec-as-drain, next
# -> Option<String>). Each producer + its synthesized next() counts, +6. `total`
# rose 73 -> 76: the three iterator methods flipped from skip to bridged (net 0 on
# total) while the 3 new next() methods add 3 bridged items with no matching skip.
#
# The CALLBACK rule then rescued `replace_all` (bridged 18 -> 19): a `<R: Replacer>`
# closure param becomes a JacCallback (Rust calls BACK into Jac once per match, via
# the na trampoline / CPython CFUNCTYPE). `total` is unchanged (76): replace_all
# simply flips from skip to bridged. `replacen` (an extra usize limit) stays a skip.
#
# The Vec/slice-DRAIN rule (M4 Phase B) then rescued `RegexSet::patterns -> &[String]`
# (bridged 19 -> 22, total 76 -> 77): a method returning a string collection directly
# becomes an OwnedPatterns drain (producer + next(), +2 bridged) and RegexSet stops
# being a dead type. A `&[String]` is copied with `.to_vec()`; `Vec<String>` as-is;
# `Vec<&str>`/`&[&str]` via `.iter().map(to_string)`.
#
# The INTEGER + HashMap/Vec verticals (M6 binder tail) then lifted regex 22 -> 31:
# integer params/returns now cross (TAG_INT/TAG_UINT) so is_match_at + the Match/
# Captures int readers (start/end/len) bridge, and the owning-wrapper `seen` guard
# was fixed from a visited-ever set to an active-path stack so two sibling readers
# (Captures::name AND Captures::get) both produce OwnedMatch instead of the first
# starving the second. `total` unchanged (77): every gain flips a skip to bridged.
# `total` 77 -> 84 and `dropped` 7: regex's seven lifetime-bearing types (Match,
# Captures, the iterator/cursor structs, …) are now counted as one unit each of
# hidden surface instead of being invisible. bridged is unchanged — those types
# were never emitted; they are only now honestly tallied.
#
# The 1.2.5 TUPLE-STRUCT admission then lifted regex 31 -> 39. Single-field private
# tuple structs (`SetMatches([...])`, `CaptureLocations([...])`) are the newtype-
# with-opaque-inner pattern and now bridge as opaque handles, and `RegexSet::matches
# -> SetMatches` crosses as a 1.2.4 ref-lane handle instead of a skip. `dropped`
# 7 -> 10: three more single-field tuple structs are lifetime-bearing cursors
# (`SetMatchesIter`, …) that now reach — and are honestly caught by — the lifetime
# guard, tallied as hidden surface rather than silently absent. `total` 84 -> 95
# folds the newly-considered surface in. Generated crate still compiles under
# `-D warnings` (roundtrip test).
# The FULL-PARITY lanes then lifted regex 39 -> 77 (total 95 -> 96):
#   * BUILDER CHAIN: the 22 `(&mut self, v) -> &mut Self` setters on RegexBuilder/
#     RegexSetBuilder ride the self-identity `&Self` return (macro lowers it to the
#     receiver's own handle, loader RC-pins behind the `rh == self` guard), and both
#     `build` methods bridge via the CROSS-TYPE fallible producer
#     (`-> Result<Regex, String>`, `TAG_REF|idx` + the `#[jac_error]` throw channel).
#   * OPTION<INT>: shortest_match / shortest_match_at / static_captures_len return
#     `Option<usize>` on a null-JacBuf None channel (`TAG_OPT_BIT | TAG_UINT`).
#   * ITERATOR-OF-STRINGS PARAMS: `I: IntoIterator<Item = S>, S: AsRef<str>`
#     monomorphizes to `Wide<Vec<String>>` (RegexSet::new as a static factory,
#     RegexSetBuilder::new as THE ctor), reusing the msgpack wide lane.
#   * REPLACER &str MONOMORPHIZATION: `replacen` pins `R: Replacer` to a literal
#     `&str` replacement (`Cow<str>` -> owned String); replace/replace_all keep the
#     stronger callback lane.
#   * MULTI-PARAM WRAPPER SHAPES: splitn -> OwnedSplitN (drain with forwarded
#     limit), find_at/captures_at as INLINE owning producers (own the first `&str`,
#     forward the ints), Captures::get_match as a plain non-Option nested producer,
#     SetMatches::iter collected to Vec<usize> on the list lane.
# `total` 95 -> 96: OwnedSplitN's synthesized next() is one new bridged item with
# no matching skip. The former overlay `find_str` inject is DELETED (the owned
# `find` wrapper covers it); the 9 remaining skips are honest impossibles today:
# Option<(usize,usize)> tuples (CaptureLocations::get), &mut String / const-generic
# array params (Captures::expand/extract), Range returns (Match::range, covered by
# start/end), Option<&str>-item iterators (capture_names - None for an unnamed
# group has no in-band channel), &mut-handle params (captures_read/_read_at), a
# std-trait extra ctor (from_str), and SubCaptureMatches (Captures::iter).
# The semver full-parity synth lanes (Display/Ord/FromStr + opaque field readers)
# then lifted regex 77 -> 79 (total 96 -> 97) for free: `Regex`/`RegexSet` both
# impl std FromStr, so each gains a `from_str` static calling the trait's
# associated fn fully-qualified. (regex's opaque types carry no Display/Ord and
# no public fields, so only the FromStr lane fires.)
[regex]
bridged = 79
total = 97
dropped = 10

# `total` 7 -> 11 and `dropped` 4: base64's four generic engine/config structs are
# now tallied as hidden surface rather than silently absent.
# 1.3 FN_STATIC lifted base64 1 -> 2 (total 11 -> 13): an extra `-> Self` engine
# factory admitted as a static rather than an additional-constructor skip.
# The literal-`Self` alias fix (a `-> Self` / `Result<Self, E>` associated fn whose
# rustdoc ok-type renders as `Generic("Self")` rather than the concrete name is now
# recognised) lifted base64 2 -> 6: four more engine `-> Self` factories bridge.
# base64 has no roundtrip test — its crate declares more than one `#[jac_error]`
# type, a standing macro limitation — but the added shapes are the OwnSelf/
# OwnSelfResult arms the uuid + sha2 roundtrips compile-prove.
# The re-export-path fix (flattened-trait `use` now resolves through a crate's
# re-exports in ANY public module) lifted base64 6 -> 7. `total` unchanged (13).
[base64]
bridged = 7
total = 13
dropped = 4

# chrono dropped from a *wrong* 11/264 to a correct 7/192 (M4 Phase B monomorphize):
# the generic structs Date<Tz> and DateTime<Tz> were previously emitted as bare
# `Date(pub chrono::Date)` newtypes — uncompilable, since the type arg is unknown —
# and their 4 `-> Self` methods (succ/pred, fixed_offset/to_utc) were counted as
# bridged. A generic struct with no `[type."T"] monomorphize = [..]` directive is now
# dropped (like a lifetime cursor), removing its whole surface (bridged AND skipped),
# which is why `total` falls too. With an overlay pinning concrete types (e.g.
# `["chrono::Utc"]`) those methods return as valid `DateUtc(pub chrono::Date<chrono::Utc>)`.
#
# The INTEGER vertical (M6 binder tail) then lifted chrono 7 -> 30: NaiveDate/Time,
# Duration, etc. expose many `-> i32`/`-> u32` accessors (year, month, num_seconds,
# …) and integer-param ctors/methods that now cross in a u64 slot. `total` falls
# 192 -> 174 (a warn, not a fail): several methods that were top-level integer-param
# skips are now folded in as owning-wrapper readers (counted as bridged wrapper
# methods, not as standalone surface items).
#
# Honest error typing (`impl std::error::Error` detection, not just the `*Error`
# name heuristic) then lifted chrono 30 -> 33: fallible methods returning
# `Result<_, E>` where `E` implements `Error` but isn't named `*Error` now resolve
# their error type and bridge instead of skipping. `dropped` 4 counts chrono's
# remaining unpinned generic structs (Date/DateTime<Tz> without a monomorphize
# overlay); `total` 174 -> 181 folds those four in as hidden surface.
#
# 0.3.1 (binder honesty — single deterministic constructor) then lifted `total`
# 181 -> 198: types with several `-> Self` associated fns (TimeDelta's
# `hours`/`weeks`/`zero`/… beside the winning `days`, NaiveDate's `from_ymd`/
# `from_yo` beside `from_num_days_from_ce`) now record the losers as honest
# "additional constructor" skips instead of silently letting the last-walked one
# clobber the ctor. `bridged` is unchanged (still one ctor per type); the 17 newly
# visible skips are unbridged surface that was previously invisible.
#
# The 1.2.2 `&mut self` relaxation (landed for sha2's `update`) is general: a `&mut
# self` method with an all-bridgeable signature now emits `pub fn f(&mut self, …)`
# routed through the macro's reentrancy busy-latch, instead of being a receiver
# skip. That lifted chrono 33 -> 61 (its in-place `&mut self` mutators). `total`
# 198 -> 266: the many still-unbridgeable `&mut self` methods (unsupported param or
# return types) are now each individually considered and recorded as visible skips
# rather than hidden behind one receiver-shape skip — more honest, not a regression.
#
# The 1.2.4 CROSS-TYPE / OPTIONAL handle lane then lifted chrono 61 -> 105 (past the
# Phase 1 exit target of 85). A method returning a fresh owned instance of another
# bridged type (`NaiveDateTime::date -> NaiveDate`, `NaiveDate::and_hms_opt ->
# Option<NaiveDateTime>`) or `Option<Self>` (`with_year`, `with_month`, `succ_opt`,
# `pred_opt`, ...) now bridges: the wrapper wraps the call in the target newtype and
# the macro tags it TAG_REF|idx (already general). Unlocks the whole date <-> time
# <-> datetime navigation surface. Mono types (Date<Tz>/DateTime<Tz>) are excluded
# from the ref target set (their return path reads as the generic origin), and a
# bridged-type PARAM by value (`and_time(NaiveTime)`) is a separate handle-arg lane,
# so those stay skips. `total` unchanged (266).
# 1.3 FN_STATIC lifted chrono 105 -> 145 (total 266 -> 287): chrono is dense with
# no-receiver factory functions — `NaiveDate::from_ymd`/`from_yo`, `NaiveTime::
# from_hms*`, `NaiveDateTime::from_timestamp*`, `TimeDelta::hours`/`weeks`/…,
# `FixedOffset::east`/`west` — all extra `-> Self`/`-> Option<Self>` associated fns
# the single ctor slot couldn't hold. They are now static methods (+40) instead of
# "additional constructor" skips. All are INHERENT (no trait `use` needed) and use
# the proven OwnSelf/OptRef/Ref/Int arms. `total` +21 as newly-considered assoc
# surface folds in. (chrono's own full bridge compile is blocked by a pre-existing,
# unrelated multi-`#[jac_error]` limitation, so it has no roundtrip test; the static
# shapes are compile-proven by the uuid + sha2 roundtrips.)
# The literal-`Self` alias fix lifted chrono 145 -> 147 (total 287 -> 289): two more
# `Result<Self, E>` associated fns whose ok-type renders as `Generic("Self")` now
# bridge (chrono has a detected error type, so the Result lowers cleanly).
# `dropped` 4 -> 6: the transparent-data honesty rule now records `Local` and `Utc`
# — zero-field marker structs that carry inherent methods but no serde impl, so the
# wide lane can't rescue them — as hidden surface (needs `treat_as = "opaque"`)
# instead of dropping them silently.
# The regex full-parity work's OPTION<INT> lane lifted chrono 147 -> 175 for
# free: chrono's Parsed/DateTime surface is dense with `Option<i32>`/`Option<u32>`/
# `Option<i64>` accessors (`year`, `month`, `timestamp`, `num_nanoseconds`, ...)
# that now cross on the null-JacBuf None channel. Same proven arm, no
# chrono-specific code.
# The semver full-parity synth lanes then lifted chrono 175 -> 197: chrono's
# types are dense with Display impls (`to_string` readers) and std FromStr impls
# (`from_str` statics), plus a few Ord `cmp` readers. Same detection-driven arms,
# no chrono-specific code. total 289 -> 305 folds the newly-considered surface in.
# The re-export-path fix (flattened-trait `use` paths now resolve through a
# crate's re-exports in ANY public module, not just the root) then lifted chrono
# 197 -> 220 for free: chrono re-exports several of its own traits, whose flattened
# methods now find a compiling `use` path. `total` unchanged (305).
# The unit-enum PARAM lane (see [time]) then lifted chrono 220 -> 232 for free:
# chrono's `NaiveDate::from_isoywd(.., weekday: Weekday)`, `Datelike::with_*`, and
# `Weekday`/`Month`-taking navigation now bridge — the enum crosses as a variant-
# name string, decoded in the wrapper (unknown name throws). `total` unchanged
# (305). Same proven arm, no chrono-specific code.
[chrono]
bridged = 232
total = 305
dropped = 6

# uuid was 0 bridged: `Uuid` is a single-field private tuple struct
# (`pub struct Uuid([u8; 16])`), which `classify_type` only admitted as a Plain
# struct with stripped fields — so the whole crate fell through to nothing.
#
# The 1.2.5 TUPLE-STRUCT admission lifted uuid 0 -> 13 (past the Phase 1 exit floor
# of 8). `Uuid` now bridges as an opaque handle: a `from_slice` constructor plus 7
# methods (`is_nil`, `is_max`, `get_version_num`, and the `hyphenated`/`simple`/
# `urn`/`braced` format-handle conversions, which cross via the 1.2.4 ref lane).
# The format wrappers (`Simple`, `Braced`, `Hyphenated`, `Urn`) and `NonNilUuid`
# are themselves tuple structs now admitted, each exposing an `into_uuid`/`get`
# ref-return (+5). The generated crate compiles under `-D warnings` (roundtrip).
#
# Path resolution: `Uuid`'s format wrappers live in the PUBLIC `uuid::fmt` module
# (wrapped as `uuid::fmt::Simple`), while `NonNilUuid`/`Timestamp` live in PRIVATE
# modules re-exported at the crate root (wrapped as `uuid::NonNilUuid` via the
# root re-export). `classify_type` resolves the shortest compiling path, never the
# raw `doc.paths` canonical one (which traverses the private module).
#
# `dropped` 0 -> 1: `ThreadLocalContext<C>` is a single-field tuple struct now
# admitted, then dropped as an unpinned generic (no monomorphize overlay) — honest
# hidden surface. Still-skipped: `parse_str`/`try_parse`/`nil`/`max` and the other
# `-> Self` associated fns are recorded as "additional constructor" skips (the ABI
# has ONE ctor per type; exposing the rest needs the deferred FN_STATIC lane, same
# gap as sha2's one-shot `digest`), and `get_timestamp -> Option<Timestamp>` is a
# skip because `Timestamp`'s whole API is closures/unsupported types, leaving it a
# dead-opaque type codegen drops. u128 ctors (`from_u128`) stay out (no msgpack
# u128). `total` 6 -> 96 folds the crate's now-considered surface in.
# 1.3 FN_STATIC lifted uuid 13 -> 17: the extra `-> Self` factories the single ctor
# slot couldn't hold — `parse_str`/`try_parse`/`try_parse_ascii`/`from_slice_le`,
# all fallible `-> Result<Self, _>` — are now admitted as static methods rather than
# "additional constructor" skips (+4). uuid's infallible `nil`/`max` stay dropped
# (const-generic "generic" skips, a different gap). `total` unchanged (96).
# The literal-`Self` alias fix lifted uuid 17 -> 25: eight more `-> Self` factories
# and `-> Self` methods bridge (`Timestamp::from_gregorian_time`, `Builder` `-> Self`
# setters, …) — previously skipped as "Generic" because rustdoc renders their
# ok-type as `Generic("Self")` and the self-alias set held only the concrete name.
# `Timestamp` is now a LIVE handle, so `Uuid::get_timestamp -> Option<Timestamp>`
# survives as a valid cross-type return. The four `fmt::*` `from_str` (FromStr) trait
# ctors that the fix briefly admitted are correctly held back: an unusable-trait
# ctor can no longer WIN the ctor slot (it bypassed the loser-only guard before), so
# they stay honest skips. Roundtrip-compiled under `-D warnings`.
# The re-export-path fix (a flattened trait's `use` now resolves through the
# crate's re-exports in ANY public module, not just the root) then lifted uuid
# 25 -> 48 for free: uuid re-exports its trait surface through submodules, so more
# blanket/trait methods gained a compiling `use` path. The UNSAFE-fn skip then
# trimmed it 48 -> 47 (`NonNilUuid::new_unchecked` is an `unsafe fn` the safe
# wrapper body can't call — an honest skip, and the fix that keeps the generated
# crate compiling). `total` 96 -> 108 folds the newly-considered surface in.
# The unit-enum PARAM lane (see [time]) then lifted uuid 47 -> 48: one enum-taking
# value-return fn now bridges (its `Variant`/`Version` arg crosses as a variant-name
# string, decoded in the wrapper). The two `&Self`-returning builder SETTERS
# (`set_variant`/`set_version`) stay honest skips — a self-identity `-> &Self`
# return can't be made fallible, which an enum-param decode requires.
# Compile-verified by the uuid roundtrip test under `-D warnings`.
[uuid]
bridged = 48
total = 108
dropped = 1

# sha2's hashers ARE plain structs (`Sha256`, `Sha512`, …), and their public API
# comes from a blanket `impl<D> Digest for D` plus `DynDigest`. Track A flattening
# surfaces that surface: `DynDigest::output_size(&self)` on each of the 6 hashers,
# and — with 1.1.2's blanket-generic self-alias substitution — `Digest::new() -> D`
# recognised as a `-> Self` constructor on each. That is 6 ctors + 6 methods = 12
# bridged (up from the earlier stale `0`; the crate has always exposed structs).
# The 1.2.2 BYTE LANE then lifted sha2 12 -> 42. Each hasher gains the SHA-256
# compute surface: `update(&mut self, impl AsRef<[u8]>)` (a `&mut self` method with a
# `&[u8]` TAG_BYTES sink), `finalize(self) -> Array<u8, _>` (a consuming-`self`
# method cloned out of the shared handle, returning a `Vec<u8>` digest),
# `finalize_reset(&mut self) -> Array<u8, _>`, and `reset(&mut self)`. Across the 6
# hashers that is ~5 new methods each (+30). The one-shot `digest(data) -> Array`
# stays a skip: it is a no-receiver associated fn, which the macro ABI treats as a
# constructor (a `Self` return), so a static method returning bytes needs a distinct
# FN_STATIC lane (future). Hash-equivalence via new+update+finalize is unaffected.
# `total` unchanged (186): every gain flips a skip to bridged.
# 1.3 FN_STATIC lifted sha2 42 -> 54: each hasher gains two static associated fns
# — the one-shot `digest(data) -> Output` (a no-receiver bytes-returning fn, +6)
# and `new_with_prefix(data) -> Self` (an extra `-> Self` factory the single ctor
# slot couldn't hold, +6). `output_size()` also becomes a static but nets 0 (the
# &self `DynDigest::output_size` already claimed the name; first-wins dedup).
# `total` unchanged (186): each gain flips a skip to bridged. The na loader GATES
# statics (CPython-only).
# sha2 is COMPLETE at 54; the ≥60 floor was RETIRED (2026-07-15). Verified against
# this fixture: the whole useful hashing surface (new/update/digest/finalize/
# finalize_reset/reset/output_size) is already in the 54. The 18 remaining
# "unsupported type: Box" skips add NO new capability: 12 (`DynDigest::finalize`/
# `finalize_reset`) are exact twins of the already bridged `Digest::finalize`/
# `finalize_reset` (dedup shadows them -- a `Box<[u8]>` return arm would only turn
# them into "duplicate method name" skips, net 0), and 6 (`box_clone ->
# Box<dyn DynDigest>`) return an anonymous trait object that is unbridgeable. The
# only new-capability surface left is the `finalize_into(&mut self, out: &mut [u8])
# -> Result<(), InvalidBufferSize>` write-into-buffer family -- deferred to the wide
# lanes, not a Phase 1 gate.
[sha2]
bridged = 54
total = 186
dropped = 0

# semver@1.0.27 (Phase 2.10) is the corpus's first REAL derived-serde data crate,
# added to guard serde detection + the "manual-impl != typed record" rule on
# genuine rustdoc JSON (previously only the synthetic serde-DTO fixture exercised
# them). Its number is honest and instructive: semver reaches 50% (4/8) entirely
# through the OPAQUE-handle lane, NOT the wide serde lane. semver derives nothing
# for serde -- it implements Serialize/Deserialize BY HAND, rendering a Version as
# its string form ("1.2.3"), so `automatically_derived` is false and no typed
# record is synthesized; the value never rides the wide lane. BuildMetadata and
# Prerelease bridge as opaque handles (`as_str`/`is_empty` readers). This baseline
# reflects the crate with NO overlay.
#
# Two binder fixes landed on this seed crate lift it 4 -> 6 and make its hidden
# surface honest:
#  - The literal-`Self` alias fix bridges `BuildMetadata::new`/`Prerelease::new`
#    (fallible `-> Result<Self, Error>` ctors whose ok-type renders as
#    `Generic("Self")`) — semver has a detected error type (`Error`), so the Result
#    lowers cleanly. (+2 bridged, total 8 -> 11 as their surface folds in.)
#  - The transparent-data honesty rule records `Version`, `VersionReq`, and
#    `Comparator` — all-public-field structs with real inherent methods but no serde
#    impl, so the wide lane can't rescue them — as DROPPED (needs `treat_as =
#    "opaque"`) instead of vanishing silently. (dropped 0 -> 3.)
# With the sibling `semver.overlay.toml` (`treat_as = "opaque"` on Version/
# VersionReq/Comparator), those bridge as handles exposing `parse`/`new`/`matches`,
# and the whole generated crate compiles under `-D warnings`.
#
# The full-parity synth lanes then lift the NO-OVERLAY count 6 -> 12 (total 11 -> 15,
# dropped unchanged at 3 -- Version/VersionReq/Comparator still need the overlay to
# stop being transparent-data drops). The new bridged surface on the two naturally
# opaque types (BuildMetadata, Prerelease) is: `to_string` (Display lane), `cmp`
# (Ord lane -> i8), and `from_str` (FromStr lane -> a `<T as ::std::str::FromStr>`
# static). WITH the overlay the same lanes plus the opaque field-reader lane take
# the crate to 34/39 (87%): Version/VersionReq/Comparator add their field readers
# (`major`/`minor`/`patch` scalars, `pre`/`build` handles, `op` enum-name string)
# and their own Display/Ord/FromStr/`matches` surface; with the Option<int> lane,
# `Comparator.minor`/`.patch` (`Option<u64>`) field readers cross too, for 36/39
# (92%); the VEC-OF-HANDLE lane then bridges `VersionReq.comparators`
# (`Vec<Comparator>` as a list of owned element handles on
# TAG_LIST_BIT|TAG_REF) for 37/39 (95%). The remaining honest skips are the
# two `*::from_iter` (`FromIterator` is generic).
[semver]
bridged = 12
total = 15
dropped = 3

