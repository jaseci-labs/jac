# Coverage floor for the binder corpus — the north-star metric's ratchet (D6).
#
# The corpus gate (`tests/corpus.rs::coverage_does_not_regress`) fails if any
# crate bridges FEWER items than its floor here. Raise these as Phase B lands
# owning-wrappers, cursors, Vec/slices, and callbacks; never lower one without a
# recorded reason (a genuine upstream API removal on a fixture bump).
#
#   bridged = constructors + methods emitted into the bridge source
#   total   = bridged + skipped (every public item classify considered)
#
# Current numbers reflect the v1 (M3) rule set: opaque types, ctors,
# scalar/str/bool/void, str returns. The low ratios are the whole point —
# they are what M4 Phase B exists to move.

# regex: owning-wrapper synthesis (M4 Phase B v1) rescued `find` -> OwnedMatch
# (readers as_str/is_empty), lifting bridged 7 -> 10. The NESTED-wrapper rule then
# rescued `captures` too: Captures has no DIRECT reader, but its `name(&str) ->
# Option<Match>` is a nested producer of OwnedMatch, giving Captures a readable
# surface (OwnedCaptures.name), lifting bridged 10 -> 12. `total` rose 66 -> 73
# because Captures' own unbridgeable methods (get/len/expand/extract/iter/get_match)
# are now each individually recorded as skips instead of hidden behind one
# `Regex::captures` skip — more honest, not a regression.
[regex]
bridged = 12
total = 73

[base64]
bridged = 1
total = 7

[chrono]
bridged = 11
total = 264

[uuid]
bridged = 0
total = 6

# sha2's hashers are `CoreWrapper` type aliases behind the `Digest` trait, so
# classify finds no plain structs. A real gap, honestly recorded as zero.
[sha2]
bridged = 0
total = 0
