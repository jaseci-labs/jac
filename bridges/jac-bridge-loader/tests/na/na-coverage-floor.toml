# na-runtime coverage floor for the loader's bridge fixtures (D6 ratchet).
#
# The sibling of the binder's tests/corpus/coverage-baseline.toml, but for the na
# (native/AOT) synthesizer (`_na_codegen.render_na_source`) instead of the Rust
# binder.  It answers a DIFFERENT question than the binder floor: not "how much of
# a real crate's API does the binder emit", but "how much of each hand-built bridge
# .so's public surface does na actually REALIZE as callable native code".  The
# counts are proven by the na conformance suite compiling + running the emitted
# source against the same .so (owning_conformance.py / conformance.py).
#
# The gate (`test_na_coverage_floor.py`) fails if the na synthesizer bridges FEWER
# items than the floor here.  Raise these as na gains verticals; never lower one
# without a recorded reason (a genuine fixture API change on a rebuild).
#
#   bridged = constructors + methods emitted into the na bridge source
#   total   = bridged + skipped (every public item render_na_source considered)
#
# A synthesized adopt-ctor and the error type's consumed message() fn are NOT
# counted here — neither is a standalone public surface item.
#
# Keyed by .so basename (regex and regex_v2 share module `regex` but are distinct
# fixtures).  A .so absent from a checkout is skipped by the gate, not failed.

# owning: the Option<Ref> owning-wrapper + Option<Str> + NESTED-wrapper verticals are
# fully realized on na — Regex.new/is_match/find/captures + OwnedMatch.as_str +
# OwnedCaptures.name + OwnedCaptures.name_match, 0 skips.  find/captures/name_match
# return `T | None` via adopt-ctor; name returns `str | None` with a null JacBuf.ptr
# crossing in-band as None (distinct from a present "").  name_match is the nested
# case: a reader on OwnedCaptures produces an OwnedMatch — the synthesizer emits
# OwnedMatch before OwnedCaptures (dependency order) so the child adopt-ctor resolves.
#
# The CURSOR + Vec-as-DRAIN verticals then added 4 more surface fns (7 -> 11):
# Regex.find_iter -> OwnedMatches (a cursor) + OwnedMatches.next -> OwnedMatch|None
# (a pull-queue; each item a nested share), and Regex.split -> OwnedSplit (a drain) +
# OwnedSplit.next -> str|None (draining an owned Vec<String>).  Both `next` methods
# are ordinary Opt(Ref)/Opt(Str) returns — no new na machinery, just more handles +
# methods — and the topological emit-order already places each product before its
# producing cursor.  Still 0 skips; proven by owning_conformance.py (22 observations
# identical na≡CPython, incl. empty streams and empty drain pieces kept distinct
# from the None that terminates each pull).
[libjac_bridge_owning_so]
bridged = 11
total = 11

# regex: the M3 golden-spike surface — Regex.new + is_match (message() is consumed
# into raised-exception text, not a surface method), 0 skips.
[libjac_bridge_regex_so]
bridged = 2
total = 2

[libjac_bridge_regex_v2_so]
bridged = 2
total = 2
