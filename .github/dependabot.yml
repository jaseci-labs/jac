version: 2
updates:
  - package-ecosystem: "pip"
    directories:
      - "/jac"
      - "/jac-byllm"
      - "/jac-client"
      - "/jac-scale"
      - "/jac-super"
      - "/jac-mcp"
      - "/jaseci-package"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
