name: Release jac-mcp to PYPI

on: workflow_dispatch

jobs:
  release-mcp:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: jac-mcp

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: Set up jac (build the binary)
        uses: ./.github/actions/setup-jac

      - name: Install jac-mcp (jaclang is host-provided by the binary)
        run: jac install -e .

      - name: Bundle documentation
        run: jac run scripts/bundle_docs.jac

      - name: Install build tools (into the binary's bundled interpreter)
        run: jac -m pip install twine

      - name: Build and publish
        run: |
          jac bundle
          jac -m twine upload dist/* -u __token__ -p ${{ secrets.PYPI_TOKEN }}
