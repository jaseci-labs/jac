name: Publish Release

# A release is exactly two things: tag v<version> and cut the GitHub Release.
# jaclang ships as the native `jac` binary (not PyPI), so there is nothing else to
# publish. Cutting the release fires release-jaclang.yml (on: release[published])
# to build and attach the per-platform binaries.

on:
  pull_request:
    types: [closed]
    branches: [main]
  # Recovery entry point. The version comes from jac/jac.toml and every step is
  # idempotent, so re-firing after a partial run is always safe.
  workflow_dispatch:

permissions: {}

jobs:
  resolve:
    if: |
      github.repository == 'Jaseci-Labs/jaseci' && (
        github.event_name == 'workflow_dispatch' || (
          github.event.pull_request.merged == true &&
          startsWith(github.event.pull_request.head.ref, 'release/')
        )
      )
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      version: ${{ steps.ver.outputs.version }}
      summary: ${{ steps.ver.outputs.summary }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      # jac/jac.toml is the source of truth for the jaclang version.
      - name: Resolve version
        id: ver
        run: |
          set -euo pipefail
          VERSION="$(grep -m1 '^version' jac/jac.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          if [ -z "$VERSION" ]; then
            echo "::error::Could not read version from jac/jac.toml"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "summary=jaclang $VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved release version: $VERSION"

  # One-click approval gate before anything outward-facing happens.
  approve:
    needs: resolve
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: pypi
    timeout-minutes: 60
    steps:
      - name: Approval granted
        env:
          SUMMARY: ${{ needs.resolve.outputs.summary }}
        run: |
          echo "Release approved: $SUMMARY"

  # Tag and cut the release. Both steps are idempotent so a re-run converges
  # instead of erroring on already-existing state.
  tag-and-release:
    needs: [resolve, approve]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # -f moves the tag if it already exists; it always points at the merged
      # release commit.
      - name: Create and push tag
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          set -euo pipefail
          VTAG="v${VERSION}"
          echo "Tagging ${VTAG} at ${GITHUB_SHA}"
          git tag --annotate --force --message="jaclang ${VERSION}" "$VTAG" "$GITHUB_SHA"
          git push --force origin "refs/tags/${VTAG}"

      # Create the release, or update it in place if it already exists. Either
      # way it ends up published and marked latest.
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ needs.resolve.outputs.version }}
          SUMMARY: ${{ needs.resolve.outputs.summary }}
        run: |
          set -euo pipefail
          VTAG="v${VERSION}"

          {
            echo "## jaclang ${VERSION} (native \`jac\` binary)"
            echo ""
            echo "Install: \`curl -fsSL https://raw.githubusercontent.com/jaseci-labs/jaseci/main/scripts/install.sh | bash\`"
          } > release_notes.md

          if gh release view "$VTAG" >/dev/null 2>&1; then
            echo "Release $VTAG exists; updating in place."
            gh release edit "$VTAG" \
              --verify-tag \
              --latest \
              --title "Release: $SUMMARY" \
              --notes-file release_notes.md
          else
            echo "Creating release $VTAG."
            gh release create "$VTAG" \
              --verify-tag \
              --latest \
              --title "Release: $SUMMARY" \
              --notes-file release_notes.md
          fi

  summary:
    needs: [resolve, tag-and-release]
    if: always() && needs.resolve.result == 'success'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 5
    steps:
      - name: Release summary
        env:
          SUMMARY: ${{ needs.resolve.outputs.summary }}
          VERSION: ${{ needs.resolve.outputs.version }}
          RELEASE: ${{ needs.tag-and-release.result }}
        run: |
          {
            echo "## Release: $SUMMARY"
            echo ""
            echo "| Step | Status |"
            echo "|------|--------|"
            echo "| Tag + GitHub Release | $RELEASE |"
            echo ""
            echo "> The native \`jac\` binaries for \`v$VERSION\` are built and attached by the **Release jac native binary** workflow, which fires on release publish."
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$RELEASE" != "success" ]; then
            echo "::error::Tag/GitHub Release step did not succeed"
            exit 1
          fi
