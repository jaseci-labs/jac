name: Publish Release

on:
  pull_request:
    types: [closed]
    branches: [main]

# Deny all permissions by default; grant only at job level.
permissions: {}

jobs:
  publish:
    if: >
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'release')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Extract package info from PR title
        id: info
        run: |
          # PR title format: "release: <package> <version>"
          TITLE="${{ github.event.pull_request.title }}"
          PACKAGE=$(echo "$TITLE" | sed -n 's/^release: \(.*\) [0-9].*/\1/p')
          VERSION=$(echo "$TITLE" | sed -n 's/^release: .* \([0-9].*\)/\1/p')
          echo "package=$PACKAGE" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=${PACKAGE}-${VERSION}" >> $GITHUB_OUTPUT
          echo "Parsed: package=$PACKAGE version=$VERSION tag=${PACKAGE}-${VERSION}"

      - name: Validate extracted info
        run: |
          if [ -z "${{ steps.info.outputs.package }}" ] || [ -z "${{ steps.info.outputs.version }}" ]; then
            echo "ERROR: Could not parse package/version from PR title: ${{ github.event.pull_request.title }}"
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true
          submodules: true

      - name: Determine package directory
        id: dir
        run: |
          declare -A PKG_DIRS=(
            ["jaclang"]="jac"
            ["jac-byllm"]="jac-byllm"
            ["jac-client"]="jac-client"
            ["jac-scale"]="jac-scale"
            ["jac-super"]="jac-super"
          )
          DIR="${PKG_DIRS[${{ steps.info.outputs.package }}]}"
          if [ -z "$DIR" ]; then
            echo "ERROR: Unknown package: ${{ steps.info.outputs.package }}"
            exit 1
          fi
          echo "dir=$DIR" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.info.outputs.tag }}" \
            -m "Release ${{ steps.info.outputs.package }} ${{ steps.info.outputs.version }}"
          git push origin "${{ steps.info.outputs.tag }}"

      - name: Set up Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        working-directory: ${{ steps.dir.outputs.dir }}
        run: python -m build

      - name: Publish to PyPI
        working-directory: ${{ steps.dir.outputs.dir }}
        run: twine upload dist/* -u __token__ -p ${{ secrets.PYPI_TOKEN }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.info.outputs.tag }}" \
            --title "${{ steps.info.outputs.package }} ${{ steps.info.outputs.version }}" \
            --notes "Release of ${{ steps.info.outputs.package }} version ${{ steps.info.outputs.version }}. See [release notes](https://github.com/${{ github.repository }}/tree/main/docs/docs/community/release_notes/) for details." \
            --latest=false
