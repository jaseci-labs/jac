name: Run tests for jaseci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-core-compiler:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
    - name: Check out code
      uses: actions/checkout@v5
      with:
        submodules: true

    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: 3.12

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e jac
        pip install pytest
        pip install pytest-xdist
        pip install watchdog

    - name: Run compiler tests
      run: pytest -x jac/tests/compiler -n auto

  test-core-runtime:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
    - name: Check out code
      uses: actions/checkout@v5
      with:
        submodules: true

    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: 3.12

    - name: Set up Bun
      # Client (cl) test files under jac/ run their `test` blocks under bun;
      # preinstall it so the runner resolves bun off PATH instead of
      # downloading it mid-suite.
      uses: oven-sh/setup-bun@v2

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e jac
        pip install pytest
        pip install pytest-xdist
        pip install watchdog

    - name: Run runtime + langserve + language tests
      run: pytest -x jac -n auto --ignore=jac/tests/compiler

  test-solid-jsdom:
    # Runtime exec of the Solid framework backend: compile a Solid component +
    # the @jac/runtime shim to JS and mount it in jsdom under node, asserting
    # render + reactivity. Needs a real `bun install` (jsdom + solid-js), so the
    # test self-skips unless JAC_CLIENT_INTEGRATION is set -- we set it here and
    # run just that file in its own lean job.
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
    - name: Check out code
      uses: actions/checkout@v5
      with:
        submodules: true

    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: 3.12

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up Bun
      uses: oven-sh/setup-bun@v2

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e jac
        pip install pytest
        pip install pytest-xdist
        pip install watchdog

    - name: Run Solid jsdom runtime test
      env:
        JAC_CLIENT_INTEGRATION: "1"
      run: pytest -x -vv jac/tests/runtimelib/test_solid_jsdom.jac

  test-client:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
    - name: Check out code
      uses: actions/checkout@v5
      with:
        submodules: true

    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: 3.12

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up Bun
      uses: oven-sh/setup-bun@v2

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e jac
        pip install pytest
        pip install pytest-xdist
        pip install playwright

    - name: Install Playwright browsers
      run: playwright install chromium --with-deps

    - name: Set environment for testing
      run: |
        echo "TEST_ENV=true" >> $GITHUB_ENV

    - name: Run all client tests
      run: pytest -x jac/tests/runtimelib/client -n auto

  test-packages-and-docs:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
    - name: Check out code
      uses: actions/checkout@v5
      with:
        submodules: true

    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: 3.12

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e jac
        jac install -e jac-byllm
        pip install pytest
        pip install pytest-xdist

    - name: Set environment for testing
      run: |
        echo "TEST_ENV=true" >> $GITHUB_ENV

    - name: Run package tests
      run: pytest -x jac-byllm

    - name: Install docs dependencies
      run: jac install -e docs

    - name: Build documentation
      run: mkdocs build --strict
      working-directory: docs

    - name: Run documentation validation tests
      run: pytest -q -x docs/tests/test_docs.jac

    - name: Install Playwright
      run: |
        pip install playwright
        playwright install chromium --with-deps

    - name: Run E2E code block tests
      run: pytest docs/tests/e2e/test_code_blocks.jac -v

  test-desktop-native:
    # Jac-native desktop tests (issue #6436). Dependency-free by design: they
    # only need the jac toolchain to compile the example hosts and inspect the
    # linked artifacts (DT_NEEDED / $ORIGIN) and run handler logic through the sv
    # pathway - NO WebKitGTK, no libpython-dev, no display/Xvfb. The webview /
    # embedded-Python *runtime* behavior is covered by a separate, gated tier.
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
    - name: Check out code
      uses: actions/checkout@v5
      with:
        submodules: true

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: 3.12

    - name: Install the jac toolchain only
      run: |
        python -m pip install --upgrade pip
        pip install -e jac
        pip install pytest
        pip install pytest-xdist

    - name: Run dependency-free desktop tests
      run: pytest -x jac/tests/runtimelib/client/test_desktop_binding.jac -n auto

  test-mcp:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
    - name: Check out code
      uses: actions/checkout@v5
      with:
        submodules: true

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: 3.12

    - name: Install jac-mcp and test dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e jac
        jac install -e jac-mcp
        pip install pytest
        pip install pytest-xdist

    - name: Run jac-mcp tests
      run: pytest -x jac-mcp -n auto

  test-scale:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    strategy:
      # Split the test files across runners by subsystem so failures are
      # readable at a glance (test-scale (data) vs an opaque shard index). Each
      # group is a separate machine, so files that bind fixed ports never
      # collide across groups, and within a group files run sequentially in
      # their own process. `misc` is the catch-all: any file not matched by a
      # named group runs there, so a newly added test is never silently skipped.
      fail-fast: false
      matrix:
        group: [server, data, microservices, deploy, misc]
    env:
      GROUP: ${{ matrix.group }}
    steps:
    - name: Check out code
      uses: actions/checkout@v5
      with:
        submodules: true

    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: 3.12

    - name: Set up Bun
      uses: oven-sh/setup-bun@v2

    - name: Install jac-scale with all test extras
      run: |
        python -m pip install --upgrade pip
        pip install -e jac
        # The `test` extra bundles jac-scale[all] (data/monitoring/tracing/
        # scheduler/deploy/aws -> redis, pymongo, prometheus-client, kubernetes)
        # plus testcontainers[mongodb,redis] and moto[s3], so the full suite has
        # every client/service dependency it needs.
        jac install -e jac-scale --extras test
        pip install pytest pytest-asyncio
        pip install requests watchdog websockets

    # Auto-discover every test under jac-scale/jac_scale/tests instead of
    # listing files by hand, so new test files are picked up automatically.
    # Each file runs in its own pytest process to preserve per-file isolation
    # (the suite relies on a fresh Jac runtime/context per file rather than on
    # teardown). The k8s-cluster tests run in the dedicated test-scale-k8s job
    # below and are skipped here because this runner has no cluster.
    - name: Run jac-scale tests (${{ matrix.group }})
      run: |
        set +e
        # k8s-cluster tests run in the dedicated test-scale-k8s job below.
        skip_re='test_(deploy_k8s|k8s_utils|pod_env|image_build)\.jac$'
        # Quarantined: pre-existing failures surfaced by auto-discovery, tracked
        # in https://github.com/jaseci-labs/jaseci/issues/6853 (perf-characterization
        # tests + a real system-root caching bug + 2 integration flows). Remove
        # entries as they are fixed under that issue.
        quarantine_re='test_(connection_overhead|redis_batch_overhead|redis_memory_leak|topology_slice_pushdown|file_upload|user_identity)\.jac$'

        # Map each test file to a subsystem group. First match wins; anything
        # unmatched falls through to `misc`, so new files always run somewhere.
        group_of() {
          case "$1" in
            *test_serve.jac|*test_restspec.jac|*test_middleware_async_root.jac|*test_sso.jac|*test_admin*.jac|*test_traces_admin.jac|*test_webhook.jac|*test_user_identity.jac|*test_file_upload.jac|*test_sv_*.jac|*test_stream_ws.jac|*test_cl_test_runner.jac|*test_examples.jac|*test_emailer_factory.jac) echo server ;;
            *test_memory*.jac|*test_mongo*.jac|*test_direct_db.jac|*test_serializer_social.jac|*test_occ_replay.jac|*test_persistence_race.jac|*test_scalar_clobber_cross_process.jac|*test_schema_repair_mongo.jac|*test_redis_*.jac|*test_local_stream.jac|*test_topology_*.jac|*test_connection_overhead.jac|*test_jwt_validation_overhead.jac|*test_storage.jac|*test_s3_storage.jac|*test_eager_spawn.jac|*test_async_*.jac|*test_commit_failure_surfacing.jac) echo data ;;
            *test_gateway.jac|*test_microservice.jac|*test_microservices_registry.jac|*test_orchestrator.jac|*test_process_manager.jac|*test_discovery.jac|*test_setup.jac|*test_plan.jac|*test_drain.jac|*test_rate_limit.jac|*test_no_image.jac|*test_local_sandbox_compat.jac) echo microservices ;;
            *test_cluster_provider.jac|*test_database_provisioner.jac|*test_keda_autoscaler.jac|*test_ingress_*.jac|*test_ops_*.jac|*test_deployer.jac|*test_abstractions.jac|*test_factories.jac) echo deploy ;;
            *) echo misc ;;
          esac
        }

        failed=""
        ran=0
        for f in $(ls jac-scale/jac_scale/tests/test_*.jac | sort); do
          echo "$f" | grep -qE "$skip_re" && continue
          if echo "$f" | grep -qE "$quarantine_re"; then
            echo "QUARANTINED (see issue #6853): $f"
            continue
          fi
          [ "$(group_of "$f")" = "$GROUP" ] || continue
          echo "::group::$f"
          # No -x: report every failure in the file, not just the first, so a
          # single run enumerates the full backlog instead of one-at-a-time.
          pytest -vv -s -rfE "$f"
          [ $? -ne 0 ] && failed="$failed $f"
          echo "::endgroup::"
          ran=$((ran + 1))
        done
        echo "Group '$GROUP' ran $ran file(s)."
        if [ -n "$failed" ]; then
          echo "::error::Failed jac-scale test files:$failed"
          exit 1
        fi
        echo "All jac-scale test files in group '$GROUP' passed."

  test-scale-k8s:
    # Runs by default; add the 'skip-k8s' label to a PR to skip it.
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-k8s') }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    strategy:
      fail-fast: false
      matrix:
        group: [deploy-core, failure-path]
    steps:
      - name: Check out code
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install Jaseci scale package
        run: |
          python -m pip install --upgrade pip
          pip install -e jac
          jac install -e jac-scale --extras deploy
          pip install pytest
          pip install pytest-xdist
          pip install pytest-asyncio

      - name: Write kind config
        run: |
          cat <<EOF > /tmp/kind-config.yaml
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
          - role: control-plane
            extraPortMappings:
            - containerPort: 30080
              hostPort: 30080
              protocol: TCP
          EOF

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: jaseci-test
          wait: 120s
          config: /tmp/kind-config.yaml

      - name: Run K8 tests (deploy-core)
        if: matrix.group == 'deploy-core'
        run: |
          pytest  -s -x jac-scale/jac_scale/tests/test_image_build.jac
          pytest  -s -x jac-scale/jac_scale/tests/test_pod_env.jac
          pytest  -s -x jac-scale/jac_scale/tests/test_k8s_utils.jac
          pytest  -s -x jac-scale/jac_scale/tests/test_deploy_k8s.jac --deselect "jac-scale/jac_scale/tests/test_deploy_k8s.jac::early exit"

      - name: Run K8 tests (failure-path)
        if: matrix.group == 'failure-path'
        run: |
          pytest  -s -x "jac-scale/jac_scale/tests/test_deploy_k8s.jac::early exit"

  test-pypi-build:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
    - name: Check out code
      uses: actions/checkout@v5
      with:
        submodules: true

    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: 3.12

    - name: Install build package
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up Bun
      uses: oven-sh/setup-bun@v2

    - name: Install jaclang for precompilation
      run: pip install -e jac

    - name: Precompile all packages
      run: |
        jac run jac/jaclang/utils/precompile_bytecode.jac ./jac
        jac run jac/jaclang/utils/precompile_bytecode.jac ./jac-scale
        jac run jac/jaclang/utils/precompile_bytecode.jac ./jac-byllm

    - name: Pre-build admin dashboard UI
      run: |
        jac install -e jac-scale --extras all
        cd jac-scale && jac run scripts/build_admin_ui.jac

    - name: Uninstall editable packages
      run: |
        pip uninstall -y jac-scale

    - name: Clean egg-info to simulate fresh build (like publish-release)
      run: |
        rm -rf jac/jaclang.egg-info
        rm -rf jac-scale/*.egg-info jac-scale/jac_scale/*.egg-info
        rm -rf jac-byllm/*.egg-info

    - name: Build and install packages
      run: |
        python -m build jac --wheel
        (cd jac-scale && jac bundle)
        (cd jac-byllm && jac bundle)
        pip install jac/dist/jaclang-*.whl
        SCALE_WHL=$(ls jac-scale/dist/jac_scale-*.whl) && pip install "${SCALE_WHL}[all]"
        pip install jac-byllm/dist/byllm-*.whl
        pip install pytest
        pip install pytest-asyncio

    - name: Verify cold start with precompiled bytecode
      run: |
        jac purge
        timeout 5 jac --version

    - name: Verify bundled guides print from the built wheel
      run: bash scripts/check-guide.sh jac

    - name: Run integration tests
      run: jac run scripts/integration_tests.jac

    - name: Run tests on built packages
      run: |
        jac check jac/tests/compiler/passes/main/fixtures/checker/checker_type_ref.jac
        pytest "jac/tests/runtimelib/client/test_cli.jac::create jac app"
        pytest jac-byllm/tests/test_byllm.jac

    # ========== jac-gpt test ==========
    - name: Create jac-gpt from jacpack
      run: |
        jac create jac-gpt --use https://raw.githubusercontent.com/jaseci-labs/jacpacks/refs/heads/main/jac-gpt/jac-gpt.jacpack
        cd jac-gpt && jac install

    - name: Install Playwright dependencies
      run: |
        pip install playwright
        playwright install chromium --with-deps

    - name: Type check jac-gpt
      working-directory: jac-gpt
      run: jac check main.jac

    - name: Restore FAISS index cache
      uses: actions/cache@v4
      with:
        path: jac-gpt/services/faiss_index
        key: jac-gpt-faiss-v1

    - name: Start jac-gpt server in background
      working-directory: jac-gpt
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        timeout 600 jac start main.jac > /tmp/jac-gpt-server.log 2>&1 &
        SERVER_PID=$!
        echo "JAC_GPT_PID=$SERVER_PID" >> $GITHUB_ENV
        echo "jac-gpt server starting with PID $SERVER_PID..."
        sleep 10
        if ! kill -0 $SERVER_PID 2>/dev/null; then
          echo "Server process died during startup"
          cat /tmp/jac-gpt-server.log
          exit 1
        fi

    - name: Wait for jac-gpt server to be ready
      run: |
        echo "Waiting for jac-gpt server on port 8000..."
        for i in $(seq 1 24); do
          if ! kill -0 ${{ env.JAC_GPT_PID }} 2>/dev/null; then
            echo "Server process exited unexpectedly"
            cat /tmp/jac-gpt-server.log
            exit 1
          fi
          if curl -sf --max-time 10 http://localhost:8000 -o /dev/null 2>&1; then
            echo "jac-gpt server is ready (attempt $i)"
            exit 0
          fi
          echo "Attempt $i/24: not ready, waiting 15s..."
          sleep 15
        done
        echo "Server failed to respond after 24 attempts"
        tail -100 /tmp/jac-gpt-server.log
        exit 1

    - name: Verify jac-gpt HTTP response
      run: |
        HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 http://localhost:8000)
        echo "jac-gpt root endpoint: HTTP $HTTP_CODE"
        if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 500 ]; then
          echo "jac-gpt server responding correctly"
        else
          echo "Unexpected HTTP $HTTP_CODE"
          exit 1
        fi

    - name: Run E2E tests
      env:
        SERVER_URL: http://localhost:8000
      run: pytest jac-gpt/tests/test_e2e.jac -v

    - name: Stop jac-gpt server
      if: always()
      run: |
        if [ -n "${{ env.JAC_GPT_PID }}" ]; then
          kill ${{ env.JAC_GPT_PID }} 2>/dev/null || true
          sleep 3
          kill -9 ${{ env.JAC_GPT_PID }} 2>/dev/null || true
        fi

    # ========== Algo test ==========
    - name: Create Algo from jacpack
      run: |
        jac create algo --use https://raw.githubusercontent.com/jaseci-labs/jacpacks/refs/heads/main/Algo/Algo.jacpack
        cd algo && jac install

    - name: Type check Algo
      working-directory: algo
      run: jac check main.jac

    - name: Start Algo server in background
      working-directory: algo
      run: |
        timeout 600 jac start main.jac > /tmp/algo-server.log 2>&1 &
        ALGO_PID=$!
        echo "ALGO_PID=$ALGO_PID" >> $GITHUB_ENV
        echo "Algo server starting with PID $ALGO_PID..."
        sleep 10
        if ! kill -0 $ALGO_PID 2>/dev/null; then
          echo "Server process died during startup"
          cat /tmp/algo-server.log
          exit 1
        fi

    - name: Wait for Algo server to be ready
      run: |
        echo "Waiting for Algo server on port 8000..."
        for i in $(seq 1 24); do
          if ! kill -0 ${{ env.ALGO_PID }} 2>/dev/null; then
            echo "Server process exited unexpectedly"
            cat /tmp/algo-server.log
            exit 1
          fi
          if curl -sf --max-time 10 http://localhost:8000 -o /dev/null 2>&1; then
            echo "Algo server is ready (attempt $i)"
            exit 0
          fi
          echo "Attempt $i/24: not ready, waiting 15s..."
          sleep 15
        done
        echo "Server failed to respond after 24 attempts"
        tail -100 /tmp/algo-server.log
        exit 1

    - name: Verify Algo HTTP response
      run: |
        HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 http://localhost:8000)
        echo "Algo root endpoint: HTTP $HTTP_CODE"
        if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 500 ]; then
          echo "Algo server responding correctly"
        else
          echo "Unexpected HTTP $HTTP_CODE"
          exit 1
        fi

    - name: Stop Algo server
      if: always()
      run: |
        if [ -n "${{ env.ALGO_PID }}" ]; then
          kill ${{ env.ALGO_PID }} 2>/dev/null || true
          sleep 3
          kill -9 ${{ env.ALGO_PID }} 2>/dev/null || true
        fi

    # ========== fullstack eject smoke ==========
    # End-to-end: the ejected FastAPI backend (jaclang + fastapi + uvicorn) must
    # install and serve HTTP. Codegen unit tests live in test_eject.jac.
    - name: Create fullstack project and eject it
      run: |
        jac create --use fullstack fs-smoke
        jac eject fs-smoke

    - name: Install ejected backend and start it
      working-directory: fs-smoke/ejected/backend
      run: |
        pip install -r requirements.txt
        PORT=8000 timeout 600 python main.py > /tmp/fullstack-ejected.log 2>&1 &
        EJECTED_PID=$!
        echo "EJECTED_PID=$EJECTED_PID" >> $GITHUB_ENV
        sleep 5
        if ! kill -0 $EJECTED_PID 2>/dev/null; then
          echo "Ejected backend died during startup"
          cat /tmp/fullstack-ejected.log
          exit 1
        fi

    - name: Verify ejected fullstack backend responds
      run: |
        for i in $(seq 1 12); do
          if ! kill -0 ${{ env.EJECTED_PID }} 2>/dev/null; then
            echo "Ejected backend exited unexpectedly"
            tail -100 /tmp/fullstack-ejected.log
            exit 1
          fi
          if curl -sf --max-time 5 http://localhost:8000/__health -o /dev/null 2>&1; then
            echo "Ejected backend responding (attempt $i)"
            exit 0
          fi
          sleep 5
        done
        echo "Ejected backend failed to respond"
        tail -100 /tmp/fullstack-ejected.log
        exit 1

    - name: Stop ejected fullstack server
      if: always()
      run: |
        if [ -n "${{ env.EJECTED_PID }}" ]; then
          kill ${{ env.EJECTED_PID }} 2>/dev/null || true
          sleep 3
          kill -9 ${{ env.EJECTED_PID }} 2>/dev/null || true
        fi

    - name: Upload jac-gpt server logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: jac-gpt-test-logs
        path: /tmp/jac-gpt-server.log
        retention-days: 7

    - name: Upload Algo server logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: algo-test-logs
        path: /tmp/algo-server.log
        retention-days: 7

    - name: Upload fullstack ejected backend logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: fullstack-ejected-logs
        path: /tmp/fullstack-ejected.log
        retention-days: 7

    - name: Jac pack test summary
      if: always()
      run: |
        echo "## Jac Pack Smoke Tests" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Test | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| jac-gpt | \`${{ job.status }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| algo | \`${{ job.status }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| fullstack (ejected) | \`${{ job.status }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| **Trigger** | \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
