name: Run tests for jaseci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # NOTE (temporary stress test): every job except test-core-compiler and
  # test-core-runtime is removed, and those two run 5x each via a matrix
  # (fail-fast: false) to confirm the `serve imported public walker without
  # auth` xdist flake is gone after the BoundaryAnalysisPass fix. Revert before merge.
  test-core-compiler:
    strategy:
      fail-fast: false
      matrix:
        attempt: [1, 2, 3, 4, 5]
    name: test-core-compiler (attempt ${{ matrix.attempt }})
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
    - name: Check out code
      uses: actions/checkout@v5
      with:
        submodules: true

    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: 3.12

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e jac
        pip install pytest
        pip install pytest-xdist
        pip install watchdog

    - name: Run compiler tests
      run: pytest -x jac/tests/compiler -n auto

  test-core-runtime:
    strategy:
      fail-fast: false
      matrix:
        attempt: [1, 2, 3, 4, 5]
    name: test-core-runtime (attempt ${{ matrix.attempt }})
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
    - name: Check out code
      uses: actions/checkout@v5
      with:
        submodules: true

    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: 3.12

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e jac
        pip install pytest
        pip install pytest-xdist
        pip install watchdog

    - name: Run runtime + langserve + language tests
      run: pytest -x jac -n auto --ignore=jac/tests/compiler
