name: Rust Bridges

# Builds and tests the Rust→Jac FFI bridge crates (bridges/): the jac-bridge
# proc macro, the seed bridge crates, and the deterministic auto-binder — plus
# the north-star coverage gate that blocks merges on a coverage regression (D6).

on:
  pull_request:
    branches:
      - main
    paths:
      - 'bridges/**'
      - '.github/workflows/rust-bridges.yml'
      # The na bridge job exercises the native callback trampoline, so a change to
      # the native codegen must also re-run this workflow's leak regression.
      - 'jac/jaclang/compiler/passes/native/**'
      - 'jac/jaclang/compiler/rust_bridge/**'
  push:
    branches:
      - main
    paths:
      - 'bridges/**'
      - '.github/workflows/rust-bridges.yml'
      # The na bridge job exercises the native callback trampoline, so a change to
      # the native codegen must also re-run this workflow's leak regression.
      - 'jac/jaclang/compiler/passes/native/**'
      - 'jac/jaclang/compiler/rust_bridge/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  bridges:
    name: Build, test, and gate coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bridges
    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            bridges/target
          key: bridges-${{ runner.os }}-${{ hashFiles('bridges/**/Cargo.toml') }}
          restore-keys: bridges-${{ runner.os }}-

      # Fast suite: unit tests, overlay, determinism, and the corpus coverage
      # gate (coverage_does_not_regress fails the build on a regression).
      - name: Test workspace
        run: cargo test --workspace --release

      # Round-trip: generate a full bridge crate from the regex fixture and
      # compile it under -D warnings, proving the binder's output is real code.
      - name: Round-trip compile (generated bridge must build clean)
        run: cargo test -p jac-bridge-binder --release -- --ignored

  # The na (native) side: the in-compiler .jac generators lower each bridged
  # method to native IR, and the loader nacompiles a probe against a real .so.
  # This job needs the LLVM shim (via the jac binary) plus the built owning .so,
  # so it is separate from the Rust-only job above.
  bridges-na:
    name: na bridge conformance + leak
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            bridges/target
          key: bridges-${{ runner.os }}-${{ hashFiles('bridges/**/Cargo.toml') }}
          restore-keys: bridges-${{ runner.os }}-

      # The na tests marshal against the real bridge .so files (metadata section
      # + symbols), so build them in release before compiling any probe.
      - name: Build the owning + scalar + map bridge .so files
        working-directory: bridges
        run: cargo build -p jac-bridge-owning -p jac-bridge-scalar -p jac-bridge-map --release

      # Provides the `jac` binary (bundled LLVM shim) on PATH and places the shim
      # in-tree at jac/jaclang/compiler/passes/native/llvm/libjacllvm.so.
      - name: Set up jac (build the binary)
        uses: ./.github/actions/setup-jac

      # Point the shim gate at the in-tree shim setup-jac just placed (the tests'
      # own zig-out path is not populated by a binary build).
      - name: Export the in-tree LLVM shim
        run: echo "JAC_LLVM_SHIM=$GITHUB_WORKSPACE/jac/jaclang/compiler/passes/native/llvm/libjacllvm.so" >> "$GITHUB_ENV"

      - name: Run the na callback RC-leak regression
        run: jac test bridges/jac-bridge-loader/tests/na/test_callback_leak.jac

      - name: Run the na owning conformance vertical
        run: jac test bridges/jac-bridge-loader/tests/na/owning_conformance.jac

      # M6.1 integer boundary tags (TAG_INT / TAG_UINT): the ABI drift guard, the
      # CPython + na source-shape unit tests, and the na<->CPython conformance
      # against the same scalar .so.
      - name: Guard the ABI constants against drift
        run: jac test bridges/jac-bridge-loader/tests/na/test_abi_drift.jac

      - name: Run the scalar integer loader + codegen unit tests
        run: |
          jac test bridges/jac-bridge-loader/tests/test_scalar.jac
          jac test bridges/jac-bridge-loader/tests/test_na_codegen_scalar.jac

      - name: Run the na scalar integer conformance vertical
        run: jac test bridges/jac-bridge-loader/tests/na/scalar_conformance.jac

      # M6.2 HashMap->dict marshaling (TAG_MAP_BIT): the CPython loader deep-copies
      # a HashMap<String, V> return into a real dict[str, V]; the na backend cannot
      # yet return a dict, so its synthesizer skips those methods cleanly (asserted
      # by the codegen test) rather than emitting code that would ICE nacompile.
      - name: Run the map dict loader + na-skip codegen unit tests
        run: |
          jac test bridges/jac-bridge-loader/tests/test_map.jac
          jac test bridges/jac-bridge-loader/tests/test_na_codegen_map.jac

      # Proves the na skip leaves a compilable module: the ctor-only source that
      # remains after every map method is skipped actually nacompiles and runs.
      - name: Run the na map-skip compile proof
        run: jac test bridges/jac-bridge-loader/tests/na/map_na_skip.jac
