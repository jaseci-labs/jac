name: Release jaseci to PYPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.5)'
        required: true
        type: string

jobs:
  release-jaseci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: true
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install tools
        run: |
          pip install build twine tomlkit

      - name: Get all package versions and update pyproject.toml
        run: |
          python << 'EOF'
          import tomlkit

          # Read all package versions
          packages = {
              'jaclang': 'jac/pyproject.toml',
              'jac-byllm': 'jac-byllm/pyproject.toml',
              'jac-client': 'jac-client/pyproject.toml',
              'jac-scale': 'jac-scale/pyproject.toml',
              'jac-super': 'jac-super/pyproject.toml',
          }

          versions = {}
          for pkg, path in packages.items():
              with open(path, 'r') as f:
                  data = tomlkit.load(f)
              versions[pkg] = data['project']['version']
              print(f"Found {pkg} version: {versions[pkg]}")

          # Update jaseci pyproject.toml
          with open('jaseci-package/pyproject.toml', 'r') as f:
              data = tomlkit.load(f)

          data['project']['version'] = '${{ inputs.version }}'

          # Update dependencies
          dependencies = data['project']['dependencies']
          for i, dep in enumerate(dependencies):
              for pkg, version in versions.items():
                  if dep.startswith(pkg):
                      dependencies[i] = f'{pkg}>={version}'
                      print(f"Updated {pkg} dependency to >={version}")
                      break

          with open('jaseci-package/pyproject.toml', 'w') as f:
              tomlkit.dump(data, f)

          print(f"Updated jaseci version to ${{ inputs.version }}")
          EOF

      - name: Update release notes
        run: |
          RELEASE_NOTES="docs/docs/communityhub/release_notes/jaseci.md"
          VERSION="${{ inputs.version }}"

          # Calculate next version for unreleased section
          IFS='.' read -r major minor patch <<< "$VERSION"
          NEXT_VERSION="$major.$minor.$((patch + 1))"

          # Remove (Latest Release) from any existing version
          sed -i 's/ (Latest Release)//g' "$RELEASE_NOTES"

          # Update the unreleased version to the new version with (Latest Release)
          sed -i "s/## Jaseci .* (Unreleased)/## Jaseci $VERSION (Latest Release)/" "$RELEASE_NOTES"

          # Add new unreleased section at the top
          sed -i "/^## Jaseci $VERSION (Latest Release)/i ## Jaseci $NEXT_VERSION (Unreleased)\n" "$RELEASE_NOTES"

          echo "Updated release notes for version $VERSION"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jaseci-package/pyproject.toml docs/docs/communityhub/release_notes/jaseci.md
          git commit -m "chore: bump jaseci version to ${{ inputs.version }}"
          git push

      - name: Build and publish package
        working-directory: jaseci-package
        run: |
          python -m build
          twine upload dist/* -u __token__ -p ${{ secrets.PYPI_TOKEN }}
