name: jac single-binary self-test

# Builds the self-contained `jac` binary with one `zig build` (fetches pbs,
# assembles the payload, packs it onto the launcher stub) and exercises it with
# no system Python, then runs the FULL repo suite through the binary's own
# runner (`jac test` -> bundled pytest + xdist). This is the jaclang test gate:
# it replaces the editable `pip install -e jac` + pytest jobs (test-core-compiler
# / test-core-runtime in test-jaseci.yml). Runs on PRs to main so it gates the
# same changes those jobs used to.

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main, "feat/**"]

permissions:
  contents: read

jobs:
  build-and-selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install host tools (zstd for payload de/compression)
        run: sudo apt-get update && sudo apt-get install -y zstd

      - name: Set up Zig 0.16.0
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build the jac binary (one command)
        working-directory: jac
        run: zig build --summary all

      - name: Hermeticity + smoke (no system Python)
        working-directory: jac
        run: |
          set -euxo pipefail
          BIN="$PWD/zig-out/bin/jac"
          # glibc-only / no libpython at link time
          ldd "$BIN" || true
          ! ldd "$BIN" | grep -qi python
          WORK="$(mktemp -d)"
          printf 'obj P { has x:int=0; def sq->int { return self.x*self.x; } }\nwith entry { print(P(x=7).sq()); }\n' > "$WORK/obj.jac"
          env -i HOME="$WORK" PATH=/usr/bin:/bin "$BIN" --version
          out="$(env -i HOME="$WORK" PATH=/usr/bin:/bin "$BIN" run "$WORK/obj.jac")"
          echo "$out" | grep -q 49

      - name: Run real jac programs (end-to-end execution)
        working-directory: jac
        run: |
          set -euxo pipefail
          BIN="$PWD/zig-out/bin/jac"
          WORK="$(mktemp -d)"; cd "$WORK"
          # obj + methods + comprehension
          cat > a.jac <<'JAC'
          obj Point { has x: int; has y: int; def dist -> float { return (self.x*self.x + self.y*self.y) ** 0.5; } }
          with entry {
              p = Point(x=3, y=4);
              print("dist", p.dist());
              print([i*i for i in range(5)]);
          }
          JAC
          out="$(env -i HOME="$WORK" PATH=/usr/bin:/bin "$BIN" run "$WORK/a.jac")"
          echo "$out" | grep -q "dist 5.0"
          echo "$out" | grep -q "0, 1, 4, 9, 16"

      - name: jac test runner (self-contained test file)
        working-directory: jac
        # Blocking smoke check: the binary's test runner (pytest collection +
        # execution via the bundled pytest) works on a self-contained `.jac`
        # test under a fully hermetic env (no system Python, minimal PATH).
        run: |
          set -euxo pipefail
          BIN="$PWD/zig-out/bin/jac"
          WORK="$(mktemp -d)"
          cat > "$WORK/test_smoke.jac" <<'JAC'
          test "arithmetic" { assert 6 * 7 == 42; }
          test "comprehension" { assert [i for i in range(3)] == [0, 1, 2]; }
          test "strings" { assert "ja" + "c" == "jac"; }
          JAC
          env -i HOME="$WORK" PATH=/usr/bin:/bin JAC_TEST_JOBS=0 "$BIN" test "$WORK/test_smoke.jac"

      # Toolchains the full suite shells out to: JS backend tests need node/bun,
      # native-link tests need a C compiler (gcc ships on the runner).
      - name: Set up Node.js (JS backend tests)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Set up Bun (JS backend tests)
        uses: oven-sh/setup-bun@v2

      - name: Full repo suite via the binary (jaclang test gate)
        working-directory: jac
        # The whole `tests/` suite, run through the binary's own runner instead
        # of `pip install -e ./jac` + pytest -- this is the jaclang test gate
        # that replaces test-core-compiler / test-core-runtime. The path/fixture
        # and subprocess coupling are resolved (#6852): the binary is placed on
        # PATH as `jac` so `["jac", ...]` subprocess tests resolve it, and
        # `sys.executable`/`-m jaclang` self-invocation is handled by worker mode.
        run: |
          set -uxo pipefail
          BINDIR="$(mktemp -d)"; ln -sf "$PWD/zig-out/bin/jac" "$BINDIR/jac"
          WORK="$(mktemp -d)"
          rc=0
          PATH="$BINDIR:$PATH" HOME="$WORK" JAC_TEST_JOBS=auto \
            "$BINDIR/jac" test tests/ | tee /tmp/full.log || rc=$?
          {
            echo "## binary full-suite result"
            echo '```'
            grep -E '^(FAILED|ERROR)|passed|failed' /tmp/full.log | tail -60 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$rc"
