name: jac single-binary self-test

# Builds the self-contained `jac` binary with one `zig build` (fetches pbs,
# assembles the payload, packs it onto the launcher stub) and exercises it with
# no system Python, then runs the test suite through the binary's own runner
# (`jac test` -> bundled pytest + xdist). This is the path toward using the
# binary as the CI gate (replacing `pip install ./jac[dev]` + pytest).

on:
  workflow_dispatch:
  push:
    branches: ["feat/**"]
    paths:
      - "jac/launcher/**"
      - "jac/build.zig"
      - "jac/build.zig.zon"
      - "jac/jaclang/**"
      - ".github/workflows/test-binary.yml"

permissions:
  contents: read

jobs:
  build-and-selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install host tools (zstd for payload de/compression)
        run: sudo apt-get update && sudo apt-get install -y zstd

      - name: Set up Zig 0.16.0
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build the jac binary (one command)
        working-directory: jac
        run: zig build --summary all

      - name: Hermeticity + smoke (no system Python)
        working-directory: jac
        run: |
          set -euxo pipefail
          BIN="$PWD/zig-out/bin/jac"
          # glibc-only / no libpython at link time
          ldd "$BIN" || true
          ! ldd "$BIN" | grep -qi python
          WORK="$(mktemp -d)"
          printf 'obj P { has x:int=0; def sq->int { return self.x*self.x; } }\nwith entry { print(P(x=7).sq()); }\n' > "$WORK/obj.jac"
          env -i HOME="$WORK" PATH=/usr/bin:/bin "$BIN" --version
          out="$(env -i HOME="$WORK" PATH=/usr/bin:/bin "$BIN" run "$WORK/obj.jac")"
          echo "$out" | grep -q 49

      - name: Run real jac programs (end-to-end execution)
        working-directory: jac
        run: |
          set -euxo pipefail
          BIN="$PWD/zig-out/bin/jac"
          WORK="$(mktemp -d)"; cd "$WORK"
          # obj + methods + comprehension
          cat > a.jac <<'JAC'
          obj Point { has x: int; has y: int; def dist -> float { return (self.x*self.x + self.y*self.y) ** 0.5; } }
          with entry {
              p = Point(x=3, y=4);
              print("dist", p.dist());
              print([i*i for i in range(5)]);
          }
          JAC
          out="$(env -i HOME="$WORK" PATH=/usr/bin:/bin "$BIN" run "$WORK/a.jac")"
          echo "$out" | grep -q "dist 5.0"
          echo "$out" | grep -q "0, 1, 4, 9, 16"

      - name: jac test runner (self-contained test file)
        working-directory: jac
        # Validates the binary's test runner (pytest collection + execution) on a
        # self-contained `.jac` test. The full repo suite is NOT run here: many
        # tests are coupled to the `pip install -e ./jac` dev layout (fixtures via
        # `jaclang.__file__`, `jac` on PATH), so it stays on the pip+pytest gate
        # (test-jaseci.yml) until decoupled. Tracked in #6852.
        run: |
          set -euxo pipefail
          BIN="$PWD/zig-out/bin/jac"
          WORK="$(mktemp -d)"
          cat > "$WORK/test_smoke.jac" <<'JAC'
          test "arithmetic" { assert 6 * 7 == 42; }
          test "comprehension" { assert [i for i in range(3)] == [0, 1, 2]; }
          test "strings" { assert "ja" + "c" == "jac"; }
          JAC
          env -i HOME="$WORK" PATH=/usr/bin:/bin JAC_TEST_JOBS=0 "$BIN" test "$WORK/test_smoke.jac"
