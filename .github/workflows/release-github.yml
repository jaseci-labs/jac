name: Create GitHub Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (reads jaclang version from jac/jac.toml if empty)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  create-release:
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            # No interpreter in this job (jaclang ships as the jac binary, not a
            # system python). Read the [project] version straight from the TOML.
            VERSION=$(grep -m1 -oP '^version\s*=\s*"\K[^"]+' jac/jac.toml)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release v${{ steps.version.outputs.version }} already exists."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "Jac v${{ steps.version.outputs.version }}" \
            --generate-notes \
            --latest
          echo "Created release v${{ steps.version.outputs.version }}"

      - name: Summary
        run: |
          echo "## Release v${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.check.outputs.exists }}" = "true" ]; then
            echo "Release already existed — no action taken." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "GitHub Release created. The native \`jac\` binary build is triggered by the release-publish event (release-jaclang.yml)." >> "$GITHUB_STEP_SUMMARY"
          fi

    outputs:
      version: ${{ steps.version.outputs.version }}
      release_created: ${{ steps.check.outputs.exists == 'false' }}
