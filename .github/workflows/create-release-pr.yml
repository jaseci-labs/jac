name: Create Release PR

on:
  workflow_dispatch:
    inputs:
      jaclang:
        description: "jaclang bump"
        type: choice
        default: skip
        options: [skip, patch, minor, major]
      jac-byllm:
        description: "jac-byllm bump"
        type: choice
        default: skip
        options: [skip, patch, minor, major]
      jac-client:
        description: "jac-client bump"
        type: choice
        default: skip
        options: [skip, patch, minor, major]
      jac-scale:
        description: "jac-scale bump"
        type: choice
        default: skip
        options: [skip, patch, minor, major]
      jac-super:
        description: "jac-super bump"
        type: choice
        default: skip
        options: [skip, patch, minor, major]
      jac-mcp:
        description: "jac-mcp bump"
        type: choice
        default: skip
        options: [skip, patch, minor, major]
      jaseci:
        description: "jaseci meta-package bump"
        type: choice
        default: skip
        options: [skip, patch, minor, major]

permissions: {}

jobs:
  create-release-pr:
    if: github.repository == 'Jaseci-Labs/jaseci'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: true
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install tomlkit==0.14.0

      - name: Validate versions against PyPI
        run: |
          python scripts/validate_release.py \
            --jaclang "${{ inputs.jaclang }}" \
            --jac-byllm "${{ inputs.jac-byllm }}" \
            --jac-client "${{ inputs.jac-client }}" \
            --jac-scale "${{ inputs.jac-scale }}" \
            --jac-super "${{ inputs.jac-super }}" \
            --jac-mcp "${{ inputs.jac-mcp }}" \
            --jaseci "${{ inputs.jaseci }}"

      - name: Bump versions
        id: release
        run: |
          python scripts/release.py \
            --jaclang "${{ inputs.jaclang }}" \
            --jac-byllm "${{ inputs.jac-byllm }}" \
            --jac-client "${{ inputs.jac-client }}" \
            --jac-scale "${{ inputs.jac-scale }}" \
            --jac-super "${{ inputs.jac-super }}" \
            --jac-mcp "${{ inputs.jac-mcp }}" \
            --jaseci "${{ inputs.jaseci }}"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create branch and commit
        run: |
          git checkout -b "${{ steps.release.outputs.branch_name }}"
          git add -A
          git commit -m "${{ steps.release.outputs.pr_title }}"
          git push origin "${{ steps.release.outputs.branch_name }}"

      - name: Create PR
        env:
          GH_TOKEN: ${{ github.token }}
          PR_TITLE: ${{ steps.release.outputs.pr_title }}
          PR_BODY: ${{ steps.release.outputs.pr_body }}
          BRANCH_NAME: ${{ steps.release.outputs.branch_name }}
        run: |
          PR_URL=$(gh pr create \
            --title "$PR_TITLE" \
            --body "$PR_BODY" \
            --base main \
            --head "$BRANCH_NAME")
          echo "::notice::Release PR created: $PR_URL"
