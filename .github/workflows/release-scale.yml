name: Release jac-scale to PYPI

on: workflow_dispatch

jobs:
  precompile:
    strategy:
      matrix:
        python-version: ['3.12', '3.13', '3.14']
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install jaclang and jac-scale
        run: |
          pip install -e ./jac
          pip install -e ./jac-scale
      - name: Precompile bytecode
        run: jac run jac/scripts/precompile_bytecode.jac ./jac-scale
      - name: Upload precompiled artifacts
        uses: actions/upload-artifact@v4
        with:
          name: precompiled-scale-${{ matrix.python-version }}
          path: jac-scale/jac_scale/_precompiled/

  release-scale:
    name: Release
    needs: precompile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jac-scale

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Download precompiled artifacts
        uses: actions/download-artifact@v4
        with:
          path: jac-scale/jac_scale/_precompiled/
          pattern: precompiled-scale-*
          merge-multiple: true
      - name: Install build tools
        run: |
          pip install build twine
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install jaclang and jac-scale
        working-directory: .
        run: |
          pip install -e ./jac
          pip install -e ./jac-scale
      - name: Pre-build admin dashboard
        run: |
          cd jac_scale/admin/ui
          jac build main.jac
          mkdir -p ../_dist
          cp -r .jac/client/dist/* ../_dist/
      - name: Build and publish package
        run: |
          python -m build
          twine upload dist/* -u __token__ -p ${{ secrets.PYPI_TOKEN }}
