name: Release jac-byllm to PYPI

on:
  workflow_dispatch:

jobs:
  release-byllm:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: jac-byllm

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: Set up jac (build the binary)
        uses: ./.github/actions/setup-jac

      - name: Install twine (into the binary's bundled interpreter)
        run: jac -m pip install twine

      - name: Build and publish
        run: |
          jac bundle
          jac -m twine upload dist/* -u __token__ -p ${{ secrets.PYPI_TOKEN }}
