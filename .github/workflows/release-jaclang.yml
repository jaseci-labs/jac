name: Release jaclang to PYPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.9.9)'
        required: true
        type: string

jobs:
  release-jaclang:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: true
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install tools
        run: |
          pip install build twine tomlkit

      - name: Update version in pyproject.toml
        run: |
          python << 'EOF'
          import tomlkit

          with open('jac/pyproject.toml', 'r') as f:
              data = tomlkit.load(f)

          data['project']['version'] = '${{ inputs.version }}'

          with open('jac/pyproject.toml', 'w') as f:
              tomlkit.dump(data, f)

          print(f"Updated jaclang version to ${{ inputs.version }}")
          EOF

      - name: Update release notes
        run: |
          RELEASE_NOTES="docs/docs/communityhub/release_notes/jaclang.md"
          VERSION="${{ inputs.version }}"

          # Calculate next version for unreleased section
          IFS='.' read -r major minor patch <<< "$VERSION"
          NEXT_VERSION="$major.$minor.$((patch + 1))"

          # Remove (Latest Release) from any existing version
          sed -i 's/ (Latest Release)//g' "$RELEASE_NOTES"

          # Update the unreleased version to the new version with (Latest Release)
          sed -i "s/## jaclang .* (Unreleased)/## jaclang $VERSION (Latest Release)/" "$RELEASE_NOTES"

          # Add new unreleased section at the top (after the title line)
          sed -i "/^## jaclang $VERSION (Latest Release)/i ## jaclang $NEXT_VERSION (Unreleased)\n" "$RELEASE_NOTES"

          echo "Updated release notes for version $VERSION"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jac/pyproject.toml docs/docs/communityhub/release_notes/jaclang.md
          git commit -m "chore: bump jaclang version to ${{ inputs.version }}"
          git push

      - name: Build and publish package
        working-directory: jac
        run: |
          python -m build
          twine upload dist/* -u __token__ -p ${{ secrets.PYPI_TOKEN }}
