name: Jac Type Check

on:
  # PRs run this on-demand via `/test check` (see ci-command.yml); push to main
  # always runs it for full post-merge coverage.
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA to check (PR head; defaults to the dispatched ref tip)"
        required: false
        type: string

# Cancel superseded on-demand runs for the same commit; never cancel main.
concurrency:
  group: ${{ github.workflow }}-${{ inputs.sha || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'workflow_dispatch' }}

jobs:
  jac-check:
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./jac
          jac install -e ./jac-scale --extras all
          jac install -e ./jac-byllm

      - name: Warm up compiler cache
        run: jac --version

      - name: Run jac format (check formatting)
        run: |
          find . -type f -name "*.jac" ! -path "*/fixtures/*" ! -path "./scripts/*" ! -name "*_err.jac" ! -name "*_syntax_err.jac" -print0 | xargs -0 --no-run-if-empty jac format --check --lintfix

      - name: Verify jir_registry.jac is up to date
        run: |
          jac gen-jir-registry --verify

      - name: Run jac check (using .jacignore)
        run: |
          jac check . --ignore tests checker_*.jac *_err.jac $(grep -v '^#' .jacignore | grep -v '^[[:space:]]*$' | tr '\n' ' ') --nowarn
