name: Build Standalone Binaries

on:
  release:
    types: [published]

  workflow_call:
    inputs:
      jaseci_version:
        description: "jaseci version to build (must exist on PyPI)"
        required: true
        type: string
      release_tag:
        description: "GitHub Release tag to upload assets to (e.g. v2.3.3)"
        required: true
        type: string

  workflow_dispatch:
    inputs:
      jaseci_version:
        description: "jaseci version to build (must exist on PyPI, e.g. 2.3.2)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  # --- Resolve versions ---
  # jaseci and jaclang have independent version numbers.
  # The jaseci version comes from the release tag or manual input.
  # The jaclang version is read from jaseci's pinned dependency on PyPI.
  resolve-versions:
    runs-on: ubuntu-latest
    outputs:
      jaseci_version: ${{ steps.versions.outputs.jaseci_version }}
      jaclang_version: ${{ steps.versions.outputs.jaclang_version }}
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve jaclang version from jaseci dependency
        id: versions
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_JASECI_VERSION: ${{ inputs.jaseci_version }}
        run: |
          if [ "$EVENT_NAME" = "release" ]; then
            JASECI_VERSION="$RELEASE_TAG"
            JASECI_VERSION="${JASECI_VERSION#v}"
          else
            JASECI_VERSION="$INPUT_JASECI_VERSION"
          fi
          echo "jaseci_version=$JASECI_VERSION" >> "$GITHUB_OUTPUT"
          echo "jaseci version: $JASECI_VERSION"

          # Install jaseci to resolve the exact jaclang version it pins
          pip install "jaseci==$JASECI_VERSION" --dry-run 2>&1 | tee /tmp/pip-resolve.txt
          JACLANG_VERSION=$(grep -oP 'jaclang==\K[0-9]+\.[0-9]+\.[0-9]+' /tmp/pip-resolve.txt | head -1)

          if [ -z "$JACLANG_VERSION" ]; then
            # Fallback: install and inspect
            pip install "jaseci==$JASECI_VERSION"
            JACLANG_VERSION=$(pip show jaclang | grep -oP '^Version: \K.*')
          fi

          echo "jaclang_version=$JACLANG_VERSION" >> "$GITHUB_OUTPUT"
          echo "jaclang version: $JACLANG_VERSION"

  # --- Build jaclang (slim, core only) ---
  build-jaclang:
    needs: resolve-versions
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
          - os: macos-latest
            platform: macos-aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pex
        run: pip install pex

      - name: Build standalone binary
        env:
          VERSION: ${{ needs.resolve-versions.outputs.jaclang_version }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          ASSET="jac-${VERSION}-${PLATFORM}"
          echo "Building ${ASSET}..."

          pex \
            "jaclang==${VERSION}" \
            --console-script jac \
            --scie eager \
            --interpreter-constraint "CPython==3.12.*" \
            -o "$ASSET"

          echo "asset_name=${ASSET}" >> "$GITHUB_ENV"

      - name: Verify binary
        env:
          ASSET_NAME: ${{ env.asset_name }}
        run: |
          chmod +x "$ASSET_NAME"
          echo "Running --version check..."
          "./$ASSET_NAME" --version || true

      - name: Generate checksum
        env:
          ASSET_NAME: ${{ env.asset_name }}
        run: |
          if command -v sha256sum &>/dev/null; then
            sha256sum "$ASSET_NAME" > "${ASSET_NAME}.sha256"
          else
            shasum -a 256 "$ASSET_NAME" > "${ASSET_NAME}.sha256"
          fi
          echo "Checksum:"
          cat "${ASSET_NAME}.sha256"

      - name: Upload to GitHub Release (release event)
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          ASSET_NAME: ${{ env.asset_name }}
        run: |
          gh release upload "$RELEASE_TAG" \
            "$ASSET_NAME" \
            "${ASSET_NAME}.sha256" \
            --clobber

      - name: Upload to GitHub Release (called from another workflow)
        if: inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          ASSET_NAME: ${{ env.asset_name }}
        run: |
          gh release upload "$RELEASE_TAG" \
            "$ASSET_NAME" \
            "${ASSET_NAME}.sha256" \
            --clobber

      - name: Upload as artifact (manual dispatch without release_tag)
        if: github.event_name == 'workflow_dispatch' && inputs.release_tag == ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.asset_name }}
          path: |
            ${{ env.asset_name }}
            ${{ env.asset_name }}.sha256

  # --- Build jaseci (full, all plugins) ---
  build-jaseci:
    needs: resolve-versions
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
          - os: macos-latest
            platform: macos-aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pex
        run: pip install pex

      - name: Build standalone binary
        env:
          VERSION: ${{ needs.resolve-versions.outputs.jaseci_version }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          ASSET="jaseci-${VERSION}-${PLATFORM}"
          echo "Building ${ASSET}..."

          pex \
            "jaseci==${VERSION}" \
            --console-script jac \
            --scie eager \
            --interpreter-constraint "CPython==3.12.*" \
            -o "$ASSET"

          echo "asset_name=${ASSET}" >> "$GITHUB_ENV"

      - name: Verify binary
        env:
          ASSET_NAME: ${{ env.asset_name }}
        run: |
          chmod +x "$ASSET_NAME"
          echo "Running --version check..."
          "./$ASSET_NAME" --version || true

      - name: Generate checksum
        env:
          ASSET_NAME: ${{ env.asset_name }}
        run: |
          if command -v sha256sum &>/dev/null; then
            sha256sum "$ASSET_NAME" > "${ASSET_NAME}.sha256"
          else
            shasum -a 256 "$ASSET_NAME" > "${ASSET_NAME}.sha256"
          fi
          echo "Checksum:"
          cat "${ASSET_NAME}.sha256"

      - name: Upload to GitHub Release (release event)
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          ASSET_NAME: ${{ env.asset_name }}
        run: |
          gh release upload "$RELEASE_TAG" \
            "$ASSET_NAME" \
            "${ASSET_NAME}.sha256" \
            --clobber

      - name: Upload to GitHub Release (called from another workflow)
        if: inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          ASSET_NAME: ${{ env.asset_name }}
        run: |
          gh release upload "$RELEASE_TAG" \
            "$ASSET_NAME" \
            "${ASSET_NAME}.sha256" \
            --clobber

      - name: Upload as artifact (manual dispatch without release_tag)
        if: github.event_name == 'workflow_dispatch' && inputs.release_tag == ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.asset_name }}
          path: |
            ${{ env.asset_name }}
            ${{ env.asset_name }}.sha256

  summary:
    needs: [resolve-versions, build-jaclang, build-jaseci]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Build summary
        env:
          JASECI_VERSION: ${{ needs.resolve-versions.outputs.jaseci_version }}
          JACLANG_VERSION: ${{ needs.resolve-versions.outputs.jaclang_version }}
          BUILD_JACLANG_RESULT: ${{ needs.build-jaclang.result }}
          BUILD_JASECI_RESULT: ${{ needs.build-jaseci.result }}
        run: |
          {
            echo "## Standalone Binary Build Results"
            echo ""
            echo "**jaseci version:** $JASECI_VERSION"
            echo "**jaclang version:** $JACLANG_VERSION"
            echo ""
            echo "| Package | Platform | Status |"
            echo "|---------|----------|--------|"
            echo "| jaclang (slim) | linux-x86_64 | $BUILD_JACLANG_RESULT |"
            echo "| jaclang (slim) | macos-aarch64 | $BUILD_JACLANG_RESULT |"
            echo "| jaseci (full) | linux-x86_64 | $BUILD_JASECI_RESULT |"
            echo "| jaseci (full) | macos-aarch64 | $BUILD_JASECI_RESULT |"
            echo ""
            echo "**Note:** linux-aarch64 builds can be added when ARM runners are available."
          } >> "$GITHUB_STEP_SUMMARY"
