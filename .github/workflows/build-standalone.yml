name: Build Standalone Binaries

on:
  release:
    types: [published]

  workflow_call:
    inputs:
      jaclang_version:
        description: "jaclang version to build (must exist on PyPI, e.g. 0.16.7)"
        required: true
        type: string
      release_tag:
        description: "GitHub Release tag to upload assets to (e.g. v2.3.3)"
        required: true
        type: string

  workflow_dispatch:
    inputs:
      jaclang_version:
        description: "jaclang version to build (must exist on PyPI, e.g. 0.16.7)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  # --- Resolve versions ---
  # The standalone binary is jaclang-only. The jaclang version comes from the
  # release tag (on a release event) or from the manual/called input.
  resolve-versions:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      jaclang_version: ${{ steps.versions.outputs.jaclang_version }}
    steps:
      - name: Resolve jaclang version
        id: versions
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            JACLANG_VERSION="${{ github.event.release.tag_name }}"
            JACLANG_VERSION="${JACLANG_VERSION#v}"
          else
            JACLANG_VERSION="${{ inputs.jaclang_version }}"
          fi
          echo "jaclang_version=$JACLANG_VERSION" >> "$GITHUB_OUTPUT"
          echo "jaclang version: $JACLANG_VERSION"

  # --- Build jaclang (slim, core only) ---
  build-jaclang:
    needs: resolve-versions
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: blacksmith-4vcpu-ubuntu-2404
            platform: linux-x86_64
          - os: macos-latest
            platform: macos-aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pex
        run: pip install pex

      # Index propagation lags the upload API, so poll the real pip resolver
      # over the full dependency tree before pex builds against it.
      - name: Wait for jaclang to be installable from PyPI
        run: |
          VERSION="${{ needs.resolve-versions.outputs.jaclang_version }}"
          for i in $(seq 1 30); do
            if pip install --dry-run --ignore-installed "jaclang==${VERSION}" >/dev/null 2>&1; then
              echo "jaclang==${VERSION} resolvable on attempt ${i}"
              exit 0
            fi
            echo "jaclang==${VERSION} not yet resolvable (attempt ${i}/30); retrying in 20s..."
            sleep 20
          done
          echo "::error::jaclang==${VERSION} did not become resolvable on PyPI in time"
          pip install --dry-run --ignore-installed "jaclang==${VERSION}" || true
          exit 1

      - name: Build standalone binary
        env:
          GITHUB_TOKEN: ${{ github.token }}
          # `pex --scie eager` invokes `science`, which queries
          # api.github.com/repos/astral-sh/python-build-standalone for the
          # latest CPython interpreter release. Unauthenticated calls share
          # the runner's IP-pool 60/hour quota and routinely fail on macOS
          # runners. Pass the workflow token so science makes authenticated
          # 5000/hour calls instead.
          SCIENCE_AUTH_API_GITHUB_COM_BEARER: ${{ github.token }}
        run: |
          VERSION="${{ needs.resolve-versions.outputs.jaclang_version }}"
          ASSET="jac-${VERSION}-${{ matrix.platform }}"
          echo "Building ${ASSET}..."

          pex \
            "jaclang==${VERSION}" \
            --console-script jac \
            --scie eager \
            --interpreter-constraint "CPython==3.12.*" \
            -o "$ASSET"

          echo "asset_name=${ASSET}" >> "$GITHUB_ENV"

      - name: Verify binary
        run: |
          chmod +x "${{ env.asset_name }}"
          echo "Running --version check..."
          ./${{ env.asset_name }} --version || true

      - name: Generate checksum
        run: |
          if command -v sha256sum &>/dev/null; then
            sha256sum "${{ env.asset_name }}" > "${{ env.asset_name }}.sha256"
          else
            shasum -a 256 "${{ env.asset_name }}" > "${{ env.asset_name }}.sha256"
          fi
          echo "Checksum:"
          cat "${{ env.asset_name }}.sha256"

      - name: Upload to GitHub Release (release event)
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "${{ env.asset_name }}" \
            "${{ env.asset_name }}.sha256" \
            --clobber

      - name: Upload to GitHub Release (called from another workflow)
        if: inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ inputs.release_tag }}" \
            "${{ env.asset_name }}" \
            "${{ env.asset_name }}.sha256" \
            --clobber

      - name: Upload as artifact (manual dispatch without release_tag)
        if: github.event_name == 'workflow_dispatch' && inputs.release_tag == ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.asset_name }}
          path: |
            ${{ env.asset_name }}
            ${{ env.asset_name }}.sha256

  summary:
    needs: [resolve-versions, build-jaclang]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: always()
    steps:
      - name: Build summary
        run: |
          echo "## Standalone Binary Build Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**jaclang version:** ${{ needs.resolve-versions.outputs.jaclang_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Package | Platform | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|----------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| jaclang (slim) | linux-x86_64 | ${{ needs.build-jaclang.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| jaclang (slim) | macos-aarch64 | ${{ needs.build-jaclang.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Note:** linux-aarch64 builds can be added when ARM runners are available." >> "$GITHUB_STEP_SUMMARY"
