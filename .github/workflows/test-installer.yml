name: Test Installer

on:
  pull_request:
    paths:
      - "scripts/install.sh"
      - ".github/workflows/test-installer.yml"
  workflow_dispatch:

# Cancel superseded PR runs; never cancel a run for a commit on main.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test-installer:
    name: Test installer
    runs-on: blacksmith-4vcpu-ubuntu-2404

    # install.sh downloads the `jac` binary from a published GitHub Release, so a
    # full end-to-end install can't run against an unpublished PR. These checks
    # validate the script's logic (lint + the offline arg/uninstall paths); the
    # real download path is exercised when a release publishes jac-* assets.
    steps:
      - uses: actions/checkout@v5

      - name: ShellCheck install.sh
        run: shellcheck scripts/install.sh

      - name: "--help prints usage"
        run: |
          OUT=$(bash scripts/install.sh --help)
          echo "$OUT"
          echo "$OUT" | grep -q "Jac Programming Language Installer"

      - name: "--uninstall is a no-op when nothing is installed"
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          rm -f "$HOME/.local/bin/jac"
          bash scripts/install.sh --uninstall

      - name: "unknown flag is rejected"
        run: |
          if bash scripts/install.sh --bogus 2>/dev/null; then
            echo "FAIL: unknown flag was accepted"
            exit 1
          fi
          echo "PASS: unknown flag rejected"
