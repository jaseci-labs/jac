name: Build Desktop App

on:
  workflow_dispatch:
    inputs:
      project_path:
        description: 'Path to project (relative to repo root)'
        required: true
        default: 'jac-client/jac_client/examples/all-in-one'
      app_name:
        description: 'App name for artifacts'
        required: true
        default: 'all-in-one'
  pull_request:
    paths:
      - 'jac-client/jac_client/examples/all-in-one/**'
      - 'jac-client/jac_client/plugin/src/targets/**'
      - '.github/workflows/build-desktop.yml'
  push:
    paths:
      - 'jac-client/jac_client/examples/all-in-one/**'
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  JAC_SIDECAR_STANDALONE: 1

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libfuse2 \
            patchelf

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install -e ./jac
          pip install -e ./jac-client
          pip install -e ./jac-scale
          pip install pyinstaller

      - name: Build Desktop App
        working-directory: ${{ github.event.inputs.project_path || 'jac-client/jac_client/examples/all-in-one' }}
        run: |
          jac build main.jac --client desktop

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ github.event.inputs.app_name || 'all-in-one' }}
          path: |
            ${{ github.event.inputs.project_path || 'jac-client/jac_client/examples/all-in-one' }}/src-tauri/target/release/bundle/deb/*.deb
            ${{ github.event.inputs.project_path || 'jac-client/jac_client/examples/all-in-one' }}/src-tauri/target/release/bundle/rpm/*.rpm
            ${{ github.event.inputs.project_path || 'jac-client/jac_client/examples/all-in-one' }}/src-tauri/target/release/bundle/appimage/*.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install -e ./jac
          pip install -e ./jac-client
          pip install -e ./jac-scale
          pip install pyinstaller

      - name: Build Desktop App
        working-directory: ${{ github.event.inputs.project_path || 'jac-client/jac_client/examples/all-in-one' }}
        run: |
          jac build main.jac --client desktop

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ github.event.inputs.app_name || 'all-in-one' }}
          path: |
            ${{ github.event.inputs.project_path || 'jac-client/jac_client/examples/all-in-one' }}/src-tauri/target/release/bundle/msi/*.msi
            ${{ github.event.inputs.project_path || 'jac-client/jac_client/examples/all-in-one' }}/src-tauri/target/release/bundle/nsis/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install -e ./jac
          pip install -e ./jac-client
          pip install -e ./jac-scale
          pip install pyinstaller

      - name: Build Desktop App
        working-directory: ${{ github.event.inputs.project_path || 'jac-client/jac_client/examples/all-in-one' }}
        run: |
          jac build main.jac --client desktop

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ github.event.inputs.app_name || 'all-in-one' }}
          path: |
            ${{ github.event.inputs.project_path || 'jac-client/jac_client/examples/all-in-one' }}/src-tauri/target/release/bundle/dmg/*.dmg
            ${{ github.event.inputs.project_path || 'jac-client/jac_client/examples/all-in-one' }}/src-tauri/target/release/bundle/macos/*.app

  create-release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release (optional - uncomment to enable)
        # uses: softprops/action-gh-release@v1
        # with:
        #   files: artifacts/**/*
        #   tag_name: v${{ github.run_number }}
        #   draft: true
        run: echo "Artifacts ready for release. Uncomment above to auto-create release."
