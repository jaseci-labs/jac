name: Build Desktop App (All-in-One Example)

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: "Platforms to build (comma-separated: windows,macos,linux)"
        required: false
        default: "windows,macos,linux"
        type: string
      app_name:
        description: "Application name"
        required: false
        default: "all-in-one"
        type: string

permissions:
  contents: read

env:
  EXAMPLE_DIR: jac-client/jac_client/examples/all-in-one
  PYTHON_VERSION: "3.12"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            artifact_name: windows-installer
          - os: macos-latest
            platform: macos
            artifact_name: macos-dmg
          - os: ubuntu-22.04
            platform: linux
            artifact_name: linux-deb-rpm

    runs-on: ${{ matrix.os }}

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── System dependencies (Linux only) ─────────────────────
      # Tauri v2 on Linux needs webkit2gtk-4.1, GTK3, libsoup3,
      # plus patchelf/libfuse2 for AppImage generation.
      - name: Install Linux system deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf libfuse2 \
            libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      # ── Rust toolchain ───────────────────────────────────────
      # Not pre-installed on GitHub runners. Required for
      # compiling the Tauri Rust shell (src-tauri/).
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-reg-${{ matrix.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-reg-${{ matrix.os }}-

      # ── Python + Jac ecosystem ───────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Jac packages
        run: |
          pip install --upgrade pip
          pip install -e ./jac
          pip install -e ./jac-client
          pip install -e ./jac-scale
          pip install pyinstaller Pillow

      # ── Bun (frontend bundler) ───────────────────────────────
      # jac-client uses bun for npm installs and Vite builds.
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # ── Tauri CLI ────────────────────────────────────────────
      # jac-client invokes `cargo tauri build`, so tauri-cli must
      # be a Cargo subcommand. Try cargo-binstall for pre-built
      # binary (~10s); fall back to cargo install (~8 min).
      - name: Install Tauri CLI
        shell: bash
        run: |
          if command -v cargo-tauri &>/dev/null; then
            echo "cargo-tauri already installed, skipping"
          elif command -v cargo-binstall &>/dev/null || \
               (curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash); then
            cargo binstall tauri-cli --no-confirm --no-discover-github-token || \
              cargo install tauri-cli --locked
          else
            cargo install tauri-cli --locked
          fi

      # ── Desktop setup ────────────────────────────────────────
      # Scaffolds src-tauri/ (Cargo.toml, tauri.conf.json,
      # main.rs, icons). Remove stale src-tauri/ first so setup
      # doesn't skip thinking it's already done.
      - name: Setup desktop target
        working-directory: ${{ env.EXAMPLE_DIR }}
        shell: bash
        run: |
          rm -rf src-tauri
          jac setup desktop

      # On Linux, skip AppImage bundling -- linuxdeploy requires FUSE
      # which GitHub runners don't provide. deb + rpm still work fine.
      - name: Disable AppImage on Linux
        if: matrix.platform == 'linux'
        working-directory: ${{ env.EXAMPLE_DIR }}
        shell: bash
        run: |
          python3 -c "
          import json
          conf = 'src-tauri/tauri.conf.json'
          with open(conf) as f: c = json.load(f)
          c['bundle']['targets'] = ['deb', 'rpm']
          with open(conf, 'w') as f: json.dump(c, f, indent=2)
          print('Set bundle targets to deb + rpm (skipped appimage)')
          "

      # ── Build ────────────────────────────────────────────────
      # Compiles web bundle (Vite), bundles sidecar (PyInstaller),
      # then runs `cargo tauri build` to produce platform installers.
      #
      # Linux env vars:
      #   APPIMAGE_EXTRACT_AND_RUN=1 -- GitHub runners lack FUSE; tells
      #     linuxdeploy AppImages to extract instead of mount.
      #   NO_STRIP=true -- prevents linuxdeploy from stripping binaries,
      #     which fails on some runner configurations.
      - name: Set Linux AppImage env vars
        if: matrix.platform == 'linux'
        run: |
          echo "APPIMAGE_EXTRACT_AND_RUN=1" >> "$GITHUB_ENV"
          echo "NO_STRIP=true" >> "$GITHUB_ENV"

      - name: Build desktop app
        working-directory: ${{ env.EXAMPLE_DIR }}
        env:
          JAC_BUILD: "1"
        run: jac build --client desktop --platform ${{ matrix.platform }}
        timeout-minutes: 90

      # ── Upload artifacts ─────────────────────────────────────
      # jac build --platform <x> passes an explicit --target <triple> to Cargo,
      # so bundles land under src-tauri/target/<triple>/release/bundle/ rather
      # than src-tauri/target/release/bundle/. The glob uses target/**/bundle
      # to match either layout.
      - name: List build output
        if: always()
        working-directory: ${{ env.EXAMPLE_DIR }}
        shell: bash
        run: |
          if compgen -G "src-tauri/target/**/release/bundle" > /dev/null; then
            find src-tauri/target -type d -name bundle -exec find {} -type f \( \
              -name "*.exe" -o -name "*.msi" -o \
              -name "*.dmg" -o \
              -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" \
            \) \;
          else
            echo "No bundle directory found"
            find src-tauri/target -maxdepth 3 -type d 2>/dev/null || echo "No target dir"
          fi

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.artifact_name }}
          path: |
            ${{ env.EXAMPLE_DIR }}/src-tauri/target/**/release/bundle/**/*.exe
            ${{ env.EXAMPLE_DIR }}/src-tauri/target/**/release/bundle/**/*.msi
            ${{ env.EXAMPLE_DIR }}/src-tauri/target/**/release/bundle/**/*.dmg
            ${{ env.EXAMPLE_DIR }}/src-tauri/target/**/release/bundle/**/*.AppImage
            ${{ env.EXAMPLE_DIR }}/src-tauri/target/**/release/bundle/**/*.deb
            ${{ env.EXAMPLE_DIR }}/src-tauri/target/**/release/bundle/**/*.rpm
          if-no-files-found: warn
          retention-days: 14
