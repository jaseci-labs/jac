# Manifest for pre-commit.ci only: it lints markdown (with autofix pushed to
# the PR) and bans em-dashes on every PR. Contributors do not install
# pre-commit locally; the local git hook is `jac precommit --install`
# (see CONTRIBUTING.md), and jac formatting in CI is enforced by the
# Contribution Checks workflow's `jac fmt --check` gate.

exclude: |
    (?x)(
        ^jac/jaclang/vendor/|
        ^jac/jaclang/compiler/passes/native/llvm/|
        ^jac/jaclang/compiler/passes/native/wasm_rt/vendor/|
        ^$
    )

repos:
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.0
    hooks:
    - id: markdownlint-cli2
      args: [--fix]
  - repo: local
    hooks:
      - id: ban-em-dashes
        name: Ban em-dashes (—)
        language: pygrep
        entry: '—'
        types: [markdown]
