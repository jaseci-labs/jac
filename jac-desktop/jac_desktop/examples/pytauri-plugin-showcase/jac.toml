[project]
name = "pytauri-plugin-showcase"
version = "0.1.0"
description = "Jac desktop demo: native Tauri plugins via npm from Jac client code (PyTauri shell)."
entry-point = "main.jac"

[plugins.client]

[plugins.desktop]
name = "PyTauri Plugin Showcase"
identifier = "org.jaseci.pytauri_plugin_showcase"
version = "0.1.0"
tauri_plugins = ["dialog", "fs", "notification"]

[plugins.desktop.window]
title = "Jac · PyTauri native plugins"
width = 760
height = 640
min_width = 520
min_height = 440
resizable = true

[dependencies.npm]
"@tauri-apps/api" = "^2.9.0"
"@tauri-apps/plugin-dialog" = "^2.6.0"
"@tauri-apps/plugin-fs" = "^2.4.0"
react = "^18.2.0"
react-dom = "^18.2.0"
react-router-dom = "^6.22.0"
react-error-boundary = "^5.0.0"
react-hook-form = "^7.71.0"
zod = "^4.3.6"
"@hookform/resolvers" = "^5.2.2"
"@tauri-apps/plugin-notification" = "^2.0.0"

[dependencies.npm.dev]
vite = "^6.4.1"
"@vitejs/plugin-react" = "^4.2.1"
typescript = "^5.3.3"
"@types/react" = "^18.2.0"
"@types/react-dom" = "^18.2.0"
