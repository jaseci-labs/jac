[project]
name = "jac-shop"
version = "0.1.0"
description = "A small e-commerce app built as microservices"
entry-point = "main.jac"

[dependencies.npm]
react = "^18.2.0"
react-dom = "^18.2.0"
react-router-dom = "^6.22.0"
react-error-boundary = "^5.0.0"
zod = "^4.3.6"

[dependencies.npm.dev]
vite = "^6.4.1"
"@vitejs/plugin-react" = "^4.2.1"
typescript = "^5.3.3"
"@types/react" = "^18.2.0"
"@types/react-dom" = "^18.2.0"

[dev-dependencies]
watchdog = ">=3.0.0"

[serve]
base_route_app = "app"

[plugins.client]

# NO [plugins.scale.*] configuration - deliberately. This fixture is the
# zero-config example: a plain `sv import` microservice app deploys to
# Kubernetes as-is (#7137, #7140):
#   - services + public prefixes are auto-discovered from `sv import`
#     (products_app -> /products, ...); declare
#     [plugins.scale.microservices.routes] only to override a prefix
#   - the mongo user store defaults into the capability closure and the
#     provisioned database intent is baked into the shipped bundle
#   - client entry falls back to the project entry-point; gateway memory
#     defaults per role (2Gi)
# The CI e2e harness (k8s_microservice_real_e2e.sh) appends its test-only
# opt-ins (ingress, centralised logs, CORS) at run time, the same way the
# workflow appends [dev] - so the committed fixture stays zero-config.
