[project]
name = "jaclang"

[dev]
jaclang_source = "jac"

[precommit]
typecheck = false

[check.lint]
select = ["all", "strip-comments", "strip-docstrings"]
exclude = ["docs/*", "*/examples/*", "*/tests/*", "*/scale/*", "*/byllm/*", "console.impl.jac", "cli_boot.jac", "jir_registry.jac", "plugin_bridge.na.jac"]

[byllm.model]
default_model = "anthropic/claude-sonnet-4-6"
