[project]
name = "all-in-one"
version = "1.0.0"
description = "Budget Planner - All-in-One JAC Example"
entry-point = "src/app.jac"

[plugins.client.vite]
plugins = ["tailwindcss()"]
lib_imports = ["import tailwindcss from '@tailwindcss/vite'"]

[dependencies.npm]
react = "^18.2.0"
react-dom = "^18.2.0"
react-router-dom = "^6.22.0"
recharts = "latest"
tailwindcss = "latest"
"jac-client-node" = "1.0.3"

[dependencies.npm.dev]
"@types/react" = "^18.2.0"
"@types/react-dom" = "^18.2.0"
"@types/recharts" = "latest"
"@tailwindcss/vite" = "^4.1.17"
"@jac-client/dev-deps" = "1.0.0"

[plugins.client.assets]
custom_extensions = [".py", ".js"]



[environments.response.headers]
"Cross-Origin-Opener-Policy" = "same-origin"
"Cross-Origin-Embedder-Policy" = "require-corp"
