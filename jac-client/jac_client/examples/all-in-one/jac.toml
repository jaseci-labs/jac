[project]
name = "all-in-one"
version = "1.0.0"
description = "Jac client application: all-in-one"
entry-point = "main.jac"

[jacpack]
name = "all-in-one"
description = "Complete all-in-one example with authentication and UI components"

[serve]
base_route_app = "app"

[plugins.client.app_meta_data]
title = "All-In-One"
icon = ".assets/burger.png"
author = "Jaseci"

[plugins.client.vite]
plugins = ["tailwindcss()"]
lib_imports = ["import tailwindcss from '@tailwindcss/vite'"]

[plugins.client.vite.define]
"globalThis.APP_BUILD_TIME" = "2024-01-01T00:00:00Z"
"globalThis.FEATURE_ENABLED" = true

[plugins.client.assets]
custom_extensions = [".py", ".js"]

[plugins.client.pwa]
theme_color = "#000000"
background_color = "#ffffff"

[plugins.scale.secrets]
TEST_SECRET_KEY = "${TEST_SECRET_KEY}"

[plugins.scale.monitoring]
# DIAGNOSTIC EXPERIMENT: turn off monitoring to free ~1.5-2GB on the kind
# cluster node. Tests test_deploy_all_in_one's deep assertions on
# Prometheus/Grafana/KSM/NE will fail instead of OOM, which tells us
# whether node-memory-pressure is the actual cause of the OOM.
enabled = false
namespace = "default"
walker_metrics = true

[plugins.scale.admin]
enabled = true
username = "admin"
default_password = "admin123"
require_password_reset = true

[plugins.scale.kubernetes]
redis_dashboard = true
mongodb_dashboard = true
# Memory cap for jaclang's first-time compile. 6Gi still OOM'd at
# runtimelib/storage/local_storage.jac because the kind-cluster
# kubelet's OOM threshold can fire before cgroup limit (node-level
# memory pressure with Redis + Mongo + monitoring stack also resident).
# 8Gi gives a single-attempt fit on a 16GB GitHub runner.
memory_request = "2Gi"
memory_limit = "8Gi"

[dependencies.npm]
antd = "^6.0.0"
react = "^18.2.0"
react-dom = "^18.2.0"
react-router-dom = "^6.22.0"
react-error-boundary = "^5.0.0"
react-hook-form = "^7.71.0"
zod = "^4.3.6"
"@hookform/resolvers" = "^5.2.2"
recharts = "latest"
tailwindcss = "latest"

[dependencies.npm.dev]
vite = "^6.4.1"
"@vitejs/plugin-react" = "^4.2.1"
typescript = "^5.3.3"
"@types/react" = "^18.2.0"
"@types/react-dom" = "^18.2.0"
"@tailwindcss/vite" = "^4.1.17"

[environments.response.headers]
Cross-Origin-Opener-Policy = "same-origin"
Cross-Origin-Embedder-Policy = "require-corp"
