[project]
name = "all-in-one"
version = "1.0.0"
description = "Jac client application: all-in-one"
entry-point = "main.jac"

[jacpack]
name = "all-in-one"
description = "Complete all-in-one example with authentication and UI components"

[serve]
base_route_app = "app"

[plugins.client.app_meta_data]
title = "All-In-One"
icon = ".assets/burger.png"
author = "Jaseci"

[plugins.client.vite]
plugins = ["tailwindcss()"]
lib_imports = ["import tailwindcss from '@tailwindcss/vite'"]

[plugins.client.vite.define]
"globalThis.APP_BUILD_TIME" = "2024-01-01T00:00:00Z"
"globalThis.FEATURE_ENABLED" = true

[plugins.client.assets]
custom_extensions = [".py", ".js"]

[plugins.client.pwa]
theme_color = "#000000"
background_color = "#ffffff"

[plugins.scale.secrets]
TEST_SECRET_KEY = "${TEST_SECRET_KEY}"

[plugins.scale.monitoring]
enabled = true
namespace = "default"
walker_metrics = true

[plugins.scale.admin]
enabled = true
username = "admin"
default_password = "admin123"
require_password_reset = true

[plugins.scale.kubernetes]
redis_dashboard = true
mongodb_dashboard = true
# Diagnostic: 5-min boot grace so the pod can finish git-clone + pip
# install + jac compile + jac start before the liveness probe gets a
# vote. test_deploy_all_in_one was crashlooping mid-compile; this rules
# out "loading time" as the cause vs. an actual hang. Upstream defaults
# (10 / 20 / 80) give ~26min total grace anyway, but the readiness
# probe's 10s initial delay was still letting kubelet mark Not Ready
# very early, which the test interprets as a restart in some paths.
readiness_initial_delay = 300
liveness_initial_delay = 300

[dependencies.npm]
antd = "^6.0.0"
react = "^18.2.0"
react-dom = "^18.2.0"
react-router-dom = "^6.22.0"
react-error-boundary = "^5.0.0"
react-hook-form = "^7.71.0"
zod = "^4.3.6"
"@hookform/resolvers" = "^5.2.2"
recharts = "latest"
tailwindcss = "latest"

[dependencies.npm.dev]
vite = "^6.4.1"
"@vitejs/plugin-react" = "^4.2.1"
typescript = "^5.3.3"
"@types/react" = "^18.2.0"
"@types/react-dom" = "^18.2.0"
"@tailwindcss/vite" = "^4.1.17"

[environments.response.headers]
Cross-Origin-Opener-Policy = "same-origin"
Cross-Origin-Embedder-Policy = "require-corp"
