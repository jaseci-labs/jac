[project]
name = "google-auth"
version = "1.0.0"
description = "Jac client application: google-auth"
entry-point = "main.jac"

[dependencies.npm]
jac-client-node = "1.0.4"
"@react-oauth/google" = "latest"
jwt-decode = "latest"

[dependencies.npm.dev]
"@jac-client/dev-deps" = "1.0.0"

[dev-dependencies]
watchdog = ">=3.0.0"

[serve]
base_route_app = "app"

[plugins.client.vite.build]
minify="true"

[plugins.scale]
[plugins.scale.jwt]
secret = "your_jwt_secret_key"
algorithm = "HS256"
exp_delta_days = 7

[plugins.scale.sso]
host = "http://localhost:8000/sso"

# Configure specific providers
[plugins.scale.sso.google]
client_id = "${GOOGLE_CLIENT_ID}"
client_secret = "${GOOGLE_CLIENT_SECRET}"