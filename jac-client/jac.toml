[package]
name = "jac-client"
version = "0.3.12"
description = "Build full-stack web applications with Jac - one language for frontend and backend."
authors = [
    { name = "Jason Mars", email = "jason@mars.ninja" }
]
maintainers = [
    { name = "Jason Mars", email = "jason@mars.ninja" }
]
license = "MIT"
readme = "README.md"
keywords = ["jac", "jaclang", "jaseci", "frontend", "full-stack", "web-development"]
requires-python = ">=3.12"

[package.urls]
repository = "https://github.com/Jaseci-Labs/jaseci"
homepage = "https://jaseci.org"
documentation = "https://jac-lang.org"

[package.include]
packages = ["jac_client*"]

[package.include.data]
"*" = ["*.jac", "*.py", "*.pyi", "py.typed", "*.lark", "impl/**/*.jac", "*.impl/**/*.jac", "*.cl/**/*.jac"]
jac_client = ["templates/**/*", "templates/**/.*", "_precompiled/**/*.jir", "_precompiled/manifest.json"]

[dependencies]
jaclang = ">=0.14.0"

[dev-dependencies]
python-dotenv = "==1.0.1"
pytest = "==8.3.5"

[entrypoints.jac]
serve = "jac_client.plugin.client:JacClient"
cli = "jac_client.plugin.cli:JacCmd"
plugin_config = "jac_client.plugin.plugin_config:JacClientPluginConfig"
